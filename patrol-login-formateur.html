<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SSIAP Patrol — Accès Formateur</title>
<meta name="theme-color" content="#F8FAFC">
<link rel="icon" href="/logo/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="mib-design.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>

<style>
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(16, 185, 129, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 100%, rgba(37, 99, 235, 0.08) 0%, transparent 60%),
      var(--bg-page);
    display: flex; align-items: center; justify-content: center;
    padding: var(--space-4);
  }
  .card {
    position: relative;
    overflow: hidden;
    background: var(--bg-surface);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(15, 23, 42, 0.08);
    padding: var(--space-7) var(--space-6);
    width: 100%; max-width: 460px;
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 30px 80px -20px rgba(15, 23, 42, 0.25);
    animation: fadeIn 0.3s ease-out;
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: var(--gradient-primary);
    z-index: 1;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  .logo {
    width: 68px; height: 68px;
    border-radius: var(--radius-lg);
    background: var(--gradient-primary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto var(--space-4);
    color: #fff;
    box-shadow: 0 8px 24px -4px rgba(16, 185, 129, 0.45);
  }
  .card h1 {
    text-align: center;
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-extrabold);
    color: var(--text-1);
    letter-spacing: var(--tracking-tight);
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: var(--text-3); font-size: var(--text-sm); margin-bottom: var(--space-5); }

  .step { display: none; }
  .step.active { display: block; }

  .label {
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: var(--tracking-wide);
    display: block;
    margin-bottom: var(--space-2);
  }
  .input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    outline: none;
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    background: #fff;
    color: var(--text-1);
  }
  .input:hover { border-color: var(--border-strong); }
  .input:focus { border-color: var(--vigil-500); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }

  .btn {
    width: 100%;
    padding: var(--space-3);
    min-height: 48px;
    border-radius: var(--radius-md);
    border: 1px solid transparent;
    font-family: var(--font-body);
    font-weight: var(--weight-bold);
    font-size: var(--text-sm);
    cursor: pointer;
    transition: all var(--duration-fast);
    display: flex; align-items: center; justify-content: center; gap: var(--space-2);
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-primary {
    background: var(--gradient-primary);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.25) inset,
      0 6px 14px -4px rgba(16, 185, 129, 0.45);
  }
  .btn-primary:hover:not(:disabled) { background: var(--gradient-primary-hover); }
  .btn-gray {
    background: #fff;
    color: var(--text-2);
    border-color: var(--border-default);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 2px 6px -1px rgba(15, 23, 42, 0.08);
  }
  .btn-gray:hover { background: var(--neutral-50); color: var(--text-1); border-color: var(--border-strong); }

  .err {
    background: var(--danger-50);
    border: 1px solid var(--danger-200);
    border-left: 4px solid var(--danger-500);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    color: var(--danger-800);
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    display: none;
    margin-bottom: var(--space-3);
  }

  .session-card {
    width: 100%;
    padding: var(--space-4);
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--duration-fast);
    text-align: left;
    font-family: var(--font-body);
    margin-bottom: var(--space-2);
    display: flex; align-items: center; gap: var(--space-3);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 2px 6px -1px rgba(15, 23, 42, 0.06);
  }
  .session-card:hover {
    background: linear-gradient(135deg, #FFFFFF 0%, var(--vigil-50) 100%);
    border-color: var(--vigil-300);
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 6px 14px -2px rgba(16, 185, 129, 0.18);
  }
  .session-card:active { transform: scale(0.98); }

  .sess-icon {
    width: 44px; height: 44px;
    border-radius: var(--radius-md);
    background: var(--gradient-primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 9px;
    border-radius: var(--radius-full);
    font-size: 0.65rem;
    font-weight: var(--weight-bold);
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
  }
  .b-blue { background: var(--info-100); color: var(--info-800); }
  .b-green { background: var(--success-100); color: var(--success-800); }
  .b-orange { background: var(--warning-100); color: var(--warning-800); }
  .b-purple { background: #F3E8FF; color: #6B21A8; }
  .b-gray { background: var(--neutral-100); color: var(--neutral-700); }

  .spin {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255, 255, 255, 0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: sp 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  .form-header {
    display: flex; align-items: center; gap: var(--space-3);
    margin-bottom: var(--space-4);
    padding-bottom: var(--space-3);
    border-bottom: 1px solid var(--border-subtle);
  }
  .form-header-avatar {
    width: 40px; height: 40px;
    border-radius: var(--radius-md);
    background: var(--gradient-primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: var(--weight-extrabold);
    font-size: var(--text-sm);
    flex-shrink: 0;
  }
  .field-stack { display: flex; flex-direction: column; gap: var(--space-3); }
</style>
</head>
<body>
<a href="/index.html" aria-label="Accueil MIBsoft" data-mib-logo style="position:fixed;left:12px;bottom:12px;z-index:2147483000;display:block;line-height:0;opacity:.9;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))"><img src="/logo/icon.png" alt="MIBsoft" width="34" height="34" style="display:block"></a>

<div class="card">
  <div class="logo" aria-hidden="true">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
    </svg>
  </div>
  <h1>SSIAP Patrol</h1>
  <p class="subtitle" id="subtitle">Accès Formateur</p>

  <!-- ETAPE 1 : LOGIN FORMATEUR -->
  <div id="step-login" class="step active">
    <div class="err" id="err-login"></div>
    <div class="field-stack">
      <div>
        <label class="label">Formateur</label>
        <select id="sel-formateur" class="input">
          <option value="">Chargement...</option>
        </select>
      </div>
      <div>
        <label class="label">Code PIN</label>
        <div style="position:relative"><input type="password" id="inp-pin" class="input" placeholder="••••••" maxlength="6" inputmode="numeric" style="padding-right:40px"><button type="button" tabindex="-1" onclick="var i=document.getElementById('inp-pin');i.type=i.type==='password'?'text':'password'" aria-label="Afficher/masquer" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;font-size:16px;opacity:.6;padding:2px;line-height:1">👁</button></div>
      </div>
      <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Se connecter
      </button>
      <button class="btn btn-gray" onclick="window.history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Retour
      </button>
    </div>
  </div>

  <!-- ETAPE 2 : CHOIX DE SESSION -->
  <div id="step-sessions" class="step">
    <div class="form-header">
      <div class="form-header-avatar" id="formateur-initiales">FM</div>
      <div>
        <div style="font-family:var(--font-display);font-weight:var(--weight-bold);font-size:var(--text-sm);color:var(--text-1);" id="formateur-nom">Formateur</div>
        <div style="font-size:var(--text-xs);color:var(--text-3);">Sélectionnez votre session</div>
      </div>
    </div>
    <div id="sessions-list"></div>
    <button class="btn btn-gray" style="margin-top: var(--space-2);" onclick="retourLogin()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Changer de formateur
    </button>
  </div>

</div>

<script>
var sb = window.supabase;
var CENTER_ID = null;
var currentFormateur = null;

window.addEventListener("DOMContentLoaded", async function() {
  var params = new URLSearchParams(window.location.search);
  CENTER_ID = params.get("center");

  if (!CENTER_ID) {
    document.getElementById("subtitle").textContent = "Lien invalide";
    showErr("err-login", "Utilisez le lien fourni par votre centre.");
    return;
  }

  try {
    var cr = await sb.from("centers").select("nom").eq("id", CENTER_ID).single();
    if (cr.data) document.getElementById("subtitle").textContent = cr.data.nom;

    var fr = await sb.rpc("get_patrol_agents_from_formateurs", { p_center_id: CENTER_ID });
    var formateurs = fr.data || [];

    var sel = document.getElementById("sel-formateur");
    sel.innerHTML = "<option value=\"\">Sélectionner un formateur...</option>";
    formateurs.forEach(function(f) {
      var o = document.createElement("option");
      o.value = f.id;
      o.textContent = f.prenom + " " + f.nom;
      o.dataset.prenom = f.prenom;
      o.dataset.nom = f.nom;
      sel.appendChild(o);
    });
  } catch(e) {
    showErr("err-login", "Erreur de chargement.");
  }
});

async function doLogin() {
  hideErr("err-login");
  var sel = document.getElementById("sel-formateur");
  var pin = document.getElementById("inp-pin").value.trim();
  var opt = sel.options[sel.selectedIndex];
  var fid = sel.value;

  if (!fid) { showErr("err-login", "Sélectionnez un formateur."); return; }
  if (!pin) { showErr("err-login", "Entrez votre code PIN."); return; }

  var btn = document.getElementById("btn-login");
  btn.innerHTML = "<span class=\"spin\"></span>";
  btn.disabled = true;

  var rr;
  try {
    rr = await sb.rpc("patrol_resolve", {
      p_center_id: CENTER_ID, p_session_id: null, p_agent_id: String(fid), p_pin: pin
    });
  } catch(e) { console.error(e); }
  var row = (rr && rr.data && rr.data[0]) ? rr.data[0] : null;
  if (!row || (rr && rr.error)) { showErr("err-login", "Erreur de connexion."); restoreLoginBtn(); return; }
  if (row.locked) { showErr("err-login", "Trop de tentatives. Réessayez plus tard."); restoreLoginBtn(); return; }
  if (!row.ok) {
    showErr("err-login", "Code PIN incorrect.");
    restoreLoginBtn();
    return;
  }

  currentFormateur = { id: fid, prenom: opt.dataset.prenom, nom: opt.dataset.nom };

  var initiales = (opt.dataset.prenom[0] || "") + (opt.dataset.nom[0] || "");
  document.getElementById("formateur-initiales").textContent = initiales.toUpperCase();
  document.getElementById("formateur-nom").textContent = opt.dataset.prenom + " " + opt.dataset.nom;

  try {
    var sr = await sb.from("sessions_formation")
      .select("id, type_formation, niveau, date_debut, date_fin, statut")
      .eq("center_id", CENTER_ID)
      .eq("formateur_id", fid)
      .in("statut", ["planifiee", "en_cours"])
      .order("date_debut", { ascending: false });

    var sessions = sr.data || [];
    renderSessions(sessions);
    showStep("step-sessions");
  } catch(e) {
    showErr("err-login", "Erreur chargement sessions.");
  }

  restoreLoginBtn();
}

function restoreLoginBtn() {
  var btn = document.getElementById("btn-login");
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Se connecter';
  btn.disabled = false;
}

function renderSessions(sessions) {
  var el = document.getElementById("sessions-list");

  if (!sessions.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px 20px;color:var(--text-3);">'
      + '<div style="font-size:2rem;margin-bottom:10px;">📋</div>'
      + '<div style="font-family:var(--font-display);font-weight:var(--weight-bold);margin-bottom:4px;color:var(--text-1);">Aucune session en cours</div>'
      + '<div style="font-size:var(--text-sm);">Créez une session depuis le dashboard formateur.</div>'
      + '</div>';
    return;
  }

  var niveauBadge = { SSIAP1: "b-blue", SSIAP2: "b-orange", SSIAP3: "b-purple" };
  var typeBadge = { INI: "b-green", REC: "b-orange", RAN: "b-purple" };
  var typeLabel = { INI: "Initial", REC: "Recyclage", RAN: "Remise à niveau" };

  el.innerHTML = sessions.map(function(s) {
    var dateCode = s.date_debut
      ? "." + s.date_debut.slice(8,10) + s.date_debut.slice(5,7) + s.date_debut.slice(2,4)
      : "";
    var titre = s.type_formation + "_" + s.niveau + dateCode;
    var nbc = niveauBadge[s.niveau] || "b-gray";
    var tbc = typeBadge[s.type_formation] || "b-gray";
    var tbl = typeLabel[s.type_formation] || s.type_formation;
    var dateStr = s.date_debut ? new Date(s.date_debut).toLocaleDateString("fr-FR", {day:"2-digit",month:"short",year:"numeric"}) : "";

    return '<button class="session-card" onclick="choisirSession(\'' + s.id + '\')">'
      + '<div class="sess-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="font-family:var(--font-display);font-weight:var(--weight-bold);font-size:var(--text-sm);color:var(--text-1);margin-bottom:5px;">' + titre + '</div>'
      + '<div style="display:flex;gap:5px;flex-wrap:wrap;">'
      + '<span class="badge ' + tbc + '">' + tbl + '</span>'
      + '<span class="badge ' + nbc + '">' + s.niveau + '</span>'
      + (dateStr ? '<span class="badge b-gray">' + dateStr + '</span>' : '')
      + '</div></div>'
      + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-4);flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>'
      + '</button>';
  }).join("");
}

function choisirSession(sessionId) {
  var patrolSession = {
    centerId: CENTER_ID,
    sessionId: sessionId,
    agentId: currentFormateur.id,
    nom: currentFormateur.nom,
    prenom: currentFormateur.prenom,
    qualification: "SSIAP 3",
    type: "formateur",
    ts: Date.now()
  };
  sessionStorage.setItem("patrol_session", JSON.stringify(patrolSession));

  var base = window.location.href.replace(/patrol-login-formateur\.html.*/, "");
  window.location.href = base + "patrol-admin.html?center=" + CENTER_ID + "&session=" + sessionId + "&autologin=1&fid=" + currentFormateur.id + "&fnom=" + encodeURIComponent(currentFormateur.nom) + "&fprenom=" + encodeURIComponent(currentFormateur.prenom);
}

function retourLogin() {
  currentFormateur = null;
  document.getElementById("inp-pin").value = "";
  hideErr("err-login");
  showStep("step-login");
}

function showStep(id) {
  document.getElementById("step-login").classList.remove("active");
  document.getElementById("step-sessions").classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = "block";
}
function hideErr(id) { document.getElementById(id).style.display = "none"; }

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (document.getElementById("step-login").classList.contains("active")) doLogin();
  }
});
</script>
</body>
</html>
