name: Render UML diagrams

# Rend les diagrammes Mermaid de docs/uml.md en images (PNG + SVG) et les commite
# dans docs/diagrams/. Nécessite que GitHub Actions soit activé sur le repo
# (Settings → Actions → General : Allow all actions + Read and write permissions).

on:
  push:
    paths:
      - 'docs/uml.md'
      - '.github/workflows/render-uml.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Puppeteer config (no-sandbox)
        run: echo '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }' > puppeteer.json

      - name: Render Mermaid -> PNG & SVG
        run: |
          mkdir -p docs/diagrams
          npx -y @mermaid-js/mermaid-cli@11 -p puppeteer.json -b white       -i docs/uml.md -o docs/diagrams/uml.png
          npx -y @mermaid-js/mermaid-cli@11 -p puppeteer.json -b transparent -i docs/uml.md -o docs/diagrams/uml.svg

      - name: Commit generated images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f puppeteer.json
          git add docs/diagrams
          if git diff --cached --quiet; then
            echo "Aucune image à mettre à jour."
          else
            git commit -m "docs: rendu des diagrammes UML (PNG/SVG) [skip ci]"
            git push
          fi
