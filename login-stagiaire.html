<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MIB — Connexion Stagiaire</title>
<meta name="theme-color" content="#F8FAFC">
<link rel="icon" href="/Logo MIB.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="mib-design.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>

<style>
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(16, 185, 129, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 100%, rgba(37, 99, 235, 0.08) 0%, transparent 60%),
      var(--bg-page);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: var(--space-4);
  }
  .back-link {
    position: absolute; top: 16px; left: 16px;
    font-size: var(--text-sm); font-weight: var(--weight-semibold);
    color: var(--text-3); text-decoration: none;
    display: inline-flex; align-items: center; gap: var(--space-1);
    transition: color var(--duration-fast);
  }
  .back-link:hover { color: var(--vigil-700); }

  .logo-wrap { text-align: center; margin-bottom: var(--space-6); }
  .logo-icon {
    width: 64px; height: 64px;
    border-radius: var(--radius-lg);
    background: var(--gradient-primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem;
    margin: 0 auto var(--space-3);
    box-shadow: 0 8px 24px -4px rgba(16, 185, 129, 0.45);
  }
  .logo-title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-extrabold);
    color: var(--text-1);
    letter-spacing: var(--tracking-tight);
  }
  .logo-sub { font-size: var(--text-xs); color: var(--text-3); margin-top: 4px; }

  .auth-card {
    position: relative;
    overflow: hidden;
    background: var(--bg-surface);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(15, 23, 42, 0.08);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 20px 50px -20px rgba(15, 23, 42, 0.20),
      0 8px 25px -8px rgba(16, 185, 129, 0.12);
    width: 100%; max-width: 400px;
    padding: var(--space-6);
  }
  .auth-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: var(--gradient-primary);
    z-index: 1;
  }

  .auth-prompt { text-align: center; margin-bottom: var(--space-4); }
  .auth-prompt .title {
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-extrabold);
    color: var(--text-1);
  }
  .auth-prompt .desc { font-size: var(--text-sm); color: var(--text-3); margin-top: 4px; }

  /* PIN display */
  .pin-wrap {
    display: flex; gap: var(--space-2);
    justify-content: center;
    margin-bottom: var(--space-2);
  }
  .pin-d {
    width: 44px; height: 56px;
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: var(--weight-extrabold);
    color: var(--text-4);
    transition: all var(--duration-fast);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 1px 2px rgba(15, 23, 42, 0.04);
  }
  .pin-d.active {
    border-color: var(--vigil-500);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 0 0 3px rgba(16, 185, 129, 0.15);
  }
  .pin-d.filled {
    color: var(--vigil-700);
    border-color: var(--vigil-300);
    background: var(--vigil-50);
  }
  .pin-help {
    font-size: var(--text-xs);
    color: var(--text-3);
    text-align: center;
    margin-bottom: var(--space-5);
  }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-2);
    max-width: 260px;
    margin: 0 auto var(--space-4);
  }
  .key-btn {
    padding: var(--space-4);
    min-height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
    cursor: pointer;
    font-family: var(--font-display);
    font-weight: var(--weight-bold);
    font-size: 1.3rem;
    color: var(--text-1);
    background: #fff;
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 2px 6px -1px rgba(15, 23, 42, 0.08),
      0 1px 3px -1px rgba(15, 23, 42, 0.04);
    transition: all var(--duration-fast);
  }
  .key-btn:hover { background: var(--neutral-50); border-color: var(--border-strong); transform: translateY(-1px); }
  .key-btn:active { transform: scale(0.95); }
  .key-del {
    color: var(--text-2);
    font-size: 1rem;
  }
  .key-ok {
    background: var(--gradient-primary);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.25) inset,
      0 6px 14px -4px rgba(16, 185, 129, 0.45);
  }
  .key-ok:hover:not(:disabled) {
    background: var(--gradient-primary-hover);
  }
  .key-ok:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .alert-err {
    background: var(--danger-50);
    border: 1px solid var(--danger-200);
    border-left: 4px solid var(--danger-500);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    color: var(--danger-800);
    font-weight: var(--weight-semibold);
  }

  .loading {
    text-align: center;
    padding: var(--space-3);
    color: var(--text-3);
    font-size: var(--text-sm);
    display: flex; align-items: center; justify-content: center;
    gap: var(--space-2);
  }
  .spin {
    width: 18px; height: 18px;
    border: 2.5px solid var(--vigil-200);
    border-top-color: var(--vigil-600);
    border-radius: 50%;
    animation: sp 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<a href="index.html" class="back-link">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="19" y1="12" x2="5" y2="12"></line>
    <polyline points="12 19 5 12 12 5"></polyline>
  </svg>
  Retour
</a>

<div class="logo-wrap">
  <div class="logo-icon" aria-hidden="true">👨‍🎓</div>
  <div class="logo-title">Espace Stagiaire</div>
  <div class="logo-sub">MIB Prévention — Formation Incendie</div>
</div>

<div class="auth-card">
  <div class="auth-prompt">
    <div class="title">Votre code PIN</div>
    <div class="desc">Entrez votre PIN à 6 chiffres</div>
  </div>

  <div class="pin-wrap" id="pin-display">
    <div class="pin-d" id="pd-0">—</div>
    <div class="pin-d" id="pd-1">—</div>
    <div class="pin-d" id="pd-2">—</div>
    <div class="pin-d" id="pd-3">—</div>
    <div class="pin-d" id="pd-4">—</div>
    <div class="pin-d" id="pd-5">—</div>
  </div>
  <p class="pin-help">PIN fourni par votre formateur ou centre de formation</p>

  <div class="keypad">
    <button class="key-btn" onclick="kp('1')">1</button>
    <button class="key-btn" onclick="kp('2')">2</button>
    <button class="key-btn" onclick="kp('3')">3</button>
    <button class="key-btn" onclick="kp('4')">4</button>
    <button class="key-btn" onclick="kp('5')">5</button>
    <button class="key-btn" onclick="kp('6')">6</button>
    <button class="key-btn" onclick="kp('7')">7</button>
    <button class="key-btn" onclick="kp('8')">8</button>
    <button class="key-btn" onclick="kp('9')">9</button>
    <button class="key-btn key-del" onclick="kd()" aria-label="Effacer">⌫</button>
    <button class="key-btn" onclick="kp('0')">0</button>
    <button class="key-btn key-ok" id="key-ok" onclick="verifyPin()" disabled aria-label="Valider">✓</button>
  </div>

  <div id="pin-err" class="alert-err hidden"></div>
  <div id="pin-loading" class="loading hidden">
    <span class="spin"></span>
    Vérification...
  </div>
</div>

<script>
let pin = [];

window.addEventListener('DOMContentLoaded', () => {
  if (window.SESSION) SESSION.clear('stagiaire');
  const p = new URLSearchParams(window.location.search);
  window.preCenterId = p.get('center') || null;
});

function kp(d) { if (pin.length >= 6) return; pin.push(d); updatePin(); }
function kd() { if (!pin.length) return; pin.pop(); updatePin(); }

function updatePin() {
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById('pd-' + i);
    if (pin[i] !== undefined) {
      el.textContent = '●'; el.classList.add('filled'); el.classList.remove('active');
    } else {
      el.textContent = '—'; el.classList.remove('filled', 'active');
    }
  }
  if (pin.length < 6) document.getElementById('pd-' + pin.length)?.classList.add('active');
  document.getElementById('key-ok').disabled = pin.length !== 6;
}

document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') kp(e.key);
  else if (e.key === 'Backspace') kd();
  else if (e.key === 'Enter' && pin.length === 6) verifyPin();
});

async function verifyPin() {
  if (pin.length !== 6) return;
  const errEl = document.getElementById('pin-err');
  errEl.classList.add('hidden');
  document.getElementById('pin-loading').classList.remove('hidden');
  document.getElementById('key-ok').disabled = true;

  const pinStr = pin.join('');
  const centerId = window.preCenterId || null;

  try {
    try { await supabase.auth.signOut(); } catch (_) {}

    const { data: rows, error: rpcErr } = await supabase.rpc('login_pin_resolve', {
      p_center_id: centerId,
      p_role: 'stagiaire',
      p_pin: pinStr,
    });
    if (rpcErr) throw new Error('Erreur de connexion au serveur.');

    const row = Array.isArray(rows) ? rows[0] : rows;
    if (row?.locked) throw new Error('Compte temporairement verrouillé. Réessayez dans 5 minutes.');
    if (!row?.email) {
      await supabase.rpc('login_pin_fail', { p_center_id: centerId, p_role: 'stagiaire', p_pin: pinStr });
      throw new Error('PIN invalide ou compte désactivé.');
    }

    const { data: authData, error: authErr } = await supabase.auth.signInWithPassword({
      email: row.email,
      password: pinStr,
    });
    if (authErr) {
      await supabase.rpc('login_pin_fail', { p_center_id: centerId, p_role: 'stagiaire', p_pin: pinStr });
      throw new Error('Auth: ' + authErr.message);
    }

    try { await supabase.rpc('login_pin_success_reset'); } catch (_) {}

    const { data: stag, error: selErr } = await supabase
      .from('stagiaires')
      .select('id, nom, prenom, niveau, center_id, centers(nom, plan)')
      .eq('auth_user_id', (await supabase.auth.getUser()).data.user.id)
      .single();
    if (selErr || !stag) throw new Error('Profil stagiaire introuvable.');

    SESSION.save('stagiaire', {
      stagiaire_id: stag.id,
      stagiaire_nom: stag.prenom + ' ' + stag.nom,
      stagiaire_prenom: stag.prenom,
      stagiaire_niveau: stag.niveau,
      center_id: stag.center_id,
      center_nom: stag.centers?.nom || '',
    });

    window.location.href = 'stagiaire.html';
  } catch(e) {
    document.getElementById('pin-loading').classList.add('hidden');
    errEl.textContent = '❌ ' + e.message;
    errEl.classList.remove('hidden');
    pin = []; updatePin();
    document.getElementById('key-ok').disabled = true;
  }
}
</script>
</body>
</html>
