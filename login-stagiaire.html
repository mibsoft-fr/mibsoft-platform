<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIB — Connexion Stagiaire</title>
<meta name="theme-color" content="#f0fdf4">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:#f0fdf4;color:#111827;}
.bg-wrap{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(16,185,129,.12) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 90% 100%,rgba(5,150,105,.1) 0%,transparent 60%),
  linear-gradient(160deg,#f0fdf4 0%,#f9fffe 50%,#ecfdf5 100%);}
.card{background:linear-gradient(145deg,#fff,#f9fffe);border-radius:24px;border:1px solid rgba(255,255,255,.9);
  box-shadow:20px 20px 60px rgba(16,185,129,.1),0 8px 25px rgba(16,185,129,.07),inset 0 1px 0 rgba(255,255,255,.8);}
/* PIN */
.pin-wrap{display:flex;gap:12px;justify-content:center;margin-bottom:8px;}
.pin-d{width:56px;height:68px;border-radius:14px;
  background:linear-gradient(145deg,#dcfce7,#f0fdf4);
  border:2px solid rgba(16,185,129,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;color:#111827;
  box-shadow:inset 3px 3px 7px rgba(16,185,129,.1),inset -2px -2px 5px rgba(255,255,255,.9);transition:all .2s;}
.pin-d.active{border-color:rgba(16,185,129,.5);box-shadow:inset 3px 3px 7px rgba(16,185,129,.1),inset -2px -2px 5px rgba(255,255,255,.9),0 0 0 3px rgba(16,185,129,.12);}
.pin-d.filled{color:#059669;border-color:rgba(16,185,129,.3);}
/* PAVÉ */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.key-btn{padding:16px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:1.3rem;
  background:linear-gradient(145deg,#f9fffe,#dcfce7);color:#111827;
  box-shadow:3px 3px 8px rgba(16,185,129,.1),-2px -2px 6px rgba(255,255,255,.95);transition:all .15s;}
.key-btn:active{transform:scale(.92);}
.key-del{background:linear-gradient(145deg,#f0fdf4,#dcfce7);color:#065f46;font-size:1rem;}
.key-ok{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.4);}
.key-ok:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{width:100%;padding:15px;border-radius:13px;border:none;font-weight:800;font-size:.95rem;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,#10b981,#059669);
  box-shadow:0 6px 22px rgba(16,185,129,.45);transition:all .25s;}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.alert-err{background:#fff1f2;border:1.5px solid #fecdd3;border-radius:12px;padding:12px 16px;font-size:.82rem;color:#b91c1c;}
.logo-t{font-family:'Syne',sans-serif;font-weight:900;}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="bg-wrap"></div>

<div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-4">

  <a href="index.html" style="position:absolute;top:16px;left:16px;font-size:.82rem;font-weight:600;color:#6b7280;text-decoration:none;">← Retour</a>

  <div class="text-center mb-6">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(145deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 12px;box-shadow:5px 5px 18px rgba(16,185,129,.4);">👨‍🎓</div>
    <div class="logo-t" style="font-size:1.5rem;color:#111827;">Espace Stagiaire</div>
    <div style="font-size:.75rem;color:#6b7280;margin-top:4px;">MIB Prévention — Formation Incendie</div>
  </div>

  <div class="card w-full p-7" style="max-width:380px;">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:.95rem;font-weight:800;color:#111827;">Votre code PIN</div>
      <div style="font-size:.78rem;color:#6b7280;margin-top:4px;">Entrez votre PIN à 4 chiffres</div>
    </div>

    <!-- Affichage PIN -->
    <div class="pin-wrap" id="pin-display">
      <div class="pin-d" id="pd-0">—</div>
      <div class="pin-d" id="pd-1">—</div>
      <div class="pin-d" id="pd-2">—</div>
      <div class="pin-d" id="pd-3">—</div>
    </div>
    <p style="font-size:.7rem;color:#9ca3af;text-align:center;margin-bottom:20px;">PIN fourni par votre formateur ou centre de formation</p>

    <!-- Pavé numérique -->
    <div class="keypad mb-4">
      <button class="key-btn" onclick="kp('1')">1</button>
      <button class="key-btn" onclick="kp('2')">2</button>
      <button class="key-btn" onclick="kp('3')">3</button>
      <button class="key-btn" onclick="kp('4')">4</button>
      <button class="key-btn" onclick="kp('5')">5</button>
      <button class="key-btn" onclick="kp('6')">6</button>
      <button class="key-btn" onclick="kp('7')">7</button>
      <button class="key-btn" onclick="kp('8')">8</button>
      <button class="key-btn" onclick="kp('9')">9</button>
      <button class="key-btn key-del" onclick="kd()">⌫</button>
      <button class="key-btn" onclick="kp('0')">0</button>
      <button class="key-btn key-ok" id="key-ok" onclick="verifyPin()" disabled>✓</button>
    </div>

    <div id="pin-err" class="alert-err hidden"></div>
    <div id="pin-loading" class="hidden" style="text-align:center;padding:10px;color:#6b7280;font-size:.85rem;">
      <span class="spin" style="border-top-color:#10b981;border-color:rgba(16,185,129,.2);"></span>
      Vérification...
    </div>
  </div>
</div>

<script>
let pin = [];

// Vider session au chargement
window.addEventListener('DOMContentLoaded', () => {
  SESSION.clear('stagiaire');
  // Pré-remplir center depuis URL si QR
  const p = new URLSearchParams(window.location.search);
  window.preCenterId = p.get('center') || null;
});

function kp(d) { if (pin.length >= 4) return; pin.push(d); updatePin(); }
function kd() { if (!pin.length) return; pin.pop(); updatePin(); }

function updatePin() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('pd-' + i);
    if (pin[i] !== undefined) {
      el.textContent = '●'; el.classList.add('filled'); el.classList.remove('active');
    } else {
      el.textContent = '—'; el.classList.remove('filled', 'active');
    }
  }
  if (pin.length < 4) document.getElementById('pd-' + pin.length)?.classList.add('active');
  document.getElementById('key-ok').disabled = pin.length !== 4;
}

// Clavier physique
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') kp(e.key);
  else if (e.key === 'Backspace') kd();
  else if (e.key === 'Enter' && pin.length === 4) verifyPin();
});

async function verifyPin() {
  if (pin.length !== 4) return;
  const errEl = document.getElementById('pin-err');
  errEl.classList.add('hidden');
  document.getElementById('pin-loading').classList.remove('hidden');
  document.getElementById('key-ok').disabled = true;

  try {
    const pinStr = pin.join('');
    const pinHash = await UTILS.hash(pinStr);

    // Chercher le stagiaire par hash — avec ou sans filtre centre
    let query = supabase.from('stagiaires')
      .select('id, nom, prenom, niveau, center_id, centers(nom, plan)')
      .eq('pin_hash', pinHash)
      .eq('actif', true);

    if (window.preCenterId) {
      query = query.eq('center_id', window.preCenterId);
    }

    const { data, error } = await query;

    if (error || !data || !data.length) throw new Error('PIN invalide ou compte désactivé.');

    const stag = data[0];

    // Sauvegarder session
    SESSION.save('stagiaire', {
      stagiaire_id: stag.id,
      stagiaire_nom: stag.prenom + ' ' + stag.nom,
      stagiaire_prenom: stag.prenom,
      stagiaire_niveau: stag.niveau,
      center_id: stag.center_id,
      center_nom: stag.centers?.nom || '',
    });

    window.location.href = 'stagiaire.html';
  } catch(e) {
    document.getElementById('pin-loading').classList.add('hidden');
    errEl.textContent = '❌ ' + e.message;
    errEl.classList.remove('hidden');
    pin = []; updatePin();
    document.getElementById('key-ok').disabled = true;
  }
}
</script>
</body>
</html>
