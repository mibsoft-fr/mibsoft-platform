<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIB — Connexion Formateur</title>
<meta name="theme-color" content="#fff1f2">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:#fff1f2;color:#111827;}
.bg-wrap{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(239,68,68,.12) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 90% 100%,rgba(245,158,11,.1) 0%,transparent 60%),
  linear-gradient(160deg,#fff1f2 0%,#fff5f5 50%,#ffe4e6 100%);}
.card{background:linear-gradient(145deg,#fff,#fff8f8);border-radius:24px;border:1px solid rgba(255,255,255,.9);
  box-shadow:20px 20px 60px rgba(239,68,68,.1),0 8px 25px rgba(239,68,68,.07),inset 0 1px 0 rgba(255,255,255,.8);}

/* PIN DISPLAY */
.pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:8px;}
.pin-d{width:48px;height:60px;border-radius:13px;
  background:linear-gradient(145deg,#fce8e9,#fff0f0);
  border:2px solid rgba(239,68,68,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900;color:#111827;
  box-shadow:inset 3px 3px 7px rgba(239,68,68,.1),inset -2px -2px 5px rgba(255,255,255,.9);transition:all .2s;}
.pin-d.active{border-color:rgba(239,68,68,.5);box-shadow:inset 3px 3px 7px rgba(239,68,68,.1),inset -2px -2px 5px rgba(255,255,255,.9),0 0 0 3px rgba(239,68,68,.12);}
.pin-d.filled{color:#b91c1c;border-color:rgba(239,68,68,.3);}

/* PAVÉ NUMÉRIQUE */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.key-btn{padding:16px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:1.3rem;
  background:linear-gradient(145deg,#fff8f8,#fce8e9);color:#111827;
  box-shadow:3px 3px 8px rgba(239,68,68,.1),-2px -2px 6px rgba(255,255,255,.95),inset 0 1px 0 rgba(255,255,255,.8);
  transition:all .15s;}
.key-btn:active{transform:scale(.92);box-shadow:inset 2px 2px 6px rgba(239,68,68,.15),inset -1px -1px 3px rgba(255,255,255,.7);}
.key-del{background:linear-gradient(145deg,#fff1f2,#ffe4e6);color:#b91c1c;font-size:1rem;}
.key-ok{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;box-shadow:0 4px 14px rgba(239,68,68,.35);}
.key-ok:disabled{opacity:.4;cursor:not-allowed;}

/* CENTRES */
.centre-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;cursor:pointer;
  background:linear-gradient(145deg,#fff8f8,#fce8e9);border:2px solid rgba(239,68,68,.1);
  transition:all .2s;margin-bottom:8px;}
.centre-item:hover{border-color:rgba(239,68,68,.4);background:linear-gradient(145deg,#fce8e9,#fff0f0);transform:translateY(-2px);}
.centre-item.selected{border-color:rgba(239,68,68,.6);background:linear-gradient(145deg,#fee2e2,#fecaca);box-shadow:0 4px 14px rgba(239,68,68,.2);}
.centre-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#ef4444,#b91c1c);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}

.btn-primary{width:100%;padding:15px;border-radius:13px;border:none;font-weight:800;font-size:.95rem;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  box-shadow:0 6px 22px rgba(239,68,68,.45),inset 0 1px 0 rgba(255,255,255,.25);
  transition:all .25s;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);pointer-events:none;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(239,68,68,.5);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.alert-err{background:#fff1f2;border:1.5px solid #fecdd3;border-radius:12px;padding:12px 16px;font-size:.82rem;color:#b91c1c;}
.alert-ok{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:12px;padding:12px 16px;font-size:.82rem;color:#065f46;}
.logo-t{font-family:'Syne',sans-serif;font-weight:900;}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important;}

/* ÉTAPES */
.step{transition:all .3s;}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(239,68,68,.2);transition:all .3s;}
.step-dot.active{background:#ef4444;width:24px;border-radius:4px;}
</style>
</head>
<body>
<div class="bg-wrap"></div>

<div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-4">

  <a href="index.html" style="position:absolute;top:16px;left:16px;display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;color:#9ca3af;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='#b91c1c'" onmouseout="this.style.color='#9ca3af'">
    ← Retour
  </a>

  <!-- LOGO -->
  <div class="text-center mb-6">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(145deg,#ef4444,#b91c1c);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 12px;box-shadow:5px 5px 18px rgba(239,68,68,.4),-2px -2px 8px rgba(255,255,255,.7);">👨‍🏫</div>
    <div class="logo-t" style="font-size:1.5rem;color:#111827;">Espace Formateur</div>
    <div style="font-size:.75rem;color:#6b7280;margin-top:4px;">MIB Prévention — Formation Incendie</div>
  </div>

  <div class="card w-full p-7" style="max-width:400px;">

    <!-- Indicateur d'étapes -->
    <div class="step-indicator">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
    </div>

    <!-- ══ ÉTAPE 1 : PIN ══ -->
    <div id="step-pin" class="step">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:.95rem;font-weight:800;color:#111827;">Votre code PIN</div>
        <div style="font-size:.78rem;color:#6b7280;margin-top:4px;">Entrez votre PIN à 6 chiffres</div>
      </div>

      <!-- Affichage PIN -->
      <div class="pin-wrap" id="pin-display">
        <div class="pin-d" id="pd-0">—</div>
        <div class="pin-d" id="pd-1">—</div>
        <div class="pin-d" id="pd-2">—</div>
        <div class="pin-d" id="pd-3">—</div>
        <div class="pin-d" id="pd-4">—</div>
        <div class="pin-d" id="pd-5">—</div>
      </div>
      <p style="font-size:.7rem;color:#9ca3af;text-align:center;margin-bottom:20px;">PIN fourni par votre responsable de centre</p>

      <!-- Pavé numérique -->
      <div class="keypad mb-4">
        <button class="key-btn" onclick="kp('1')">1</button>
        <button class="key-btn" onclick="kp('2')">2</button>
        <button class="key-btn" onclick="kp('3')">3</button>
        <button class="key-btn" onclick="kp('4')">4</button>
        <button class="key-btn" onclick="kp('5')">5</button>
        <button class="key-btn" onclick="kp('6')">6</button>
        <button class="key-btn" onclick="kp('7')">7</button>
        <button class="key-btn" onclick="kp('8')">8</button>
        <button class="key-btn" onclick="kp('9')">9</button>
        <button class="key-btn key-del" onclick="kd()">⌫</button>
        <button class="key-btn" onclick="kp('0')">0</button>
        <button class="key-btn key-ok" id="key-ok" onclick="verifyPin()" disabled>✓</button>
      </div>

      <div id="pin-err" class="alert-err hidden"></div>
      <div id="pin-loading" class="hidden" style="text-align:center;padding:10px;color:#6b7280;font-size:.85rem;">
        <span class="spin" style="border-top-color:#ef4444;border-color:rgba(239,68,68,.2);"></span>
        Recherche en cours...
      </div>
    </div>

    <!-- ══ ÉTAPE 2 : CHOIX CENTRE ══ -->
    <div id="step-centre" class="step hidden">
      <button onclick="backToPin()" style="background:none;border:none;cursor:pointer;font-size:.82rem;font-weight:600;color:#9ca3af;margin-bottom:16px;display:flex;align-items:center;gap:4px;">
        ← Retour
      </button>
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:.95rem;font-weight:800;color:#111827;">Choisissez votre centre</div>
        <div style="font-size:.78rem;color:#6b7280;margin-top:4px;" id="step2-subtitle">Sélectionnez le centre pour cette session</div>
      </div>

      <div id="centres-list"></div>

      <div id="centre-err" class="alert-err hidden" style="margin-bottom:10px;"></div>
      <button class="btn-primary" id="btn-confirm" onclick="confirmCentre()" disabled>
        <span id="btn-confirm-label">Accéder à mon espace →</span>
      </button>
    </div>

  </div>
</div>

<script>
// ── ÉTAT ──
let pin = [];
let pinHash = null;
let foundFormateurs = []; // formateurs trouvés avec ce PIN
let selectedFormateur = null;

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  // Vider la session — login obligatoire
  SESSION.clear('formateur');

  // Pré-remplir centre si QR code
  const p = new URLSearchParams(window.location.search);
  window.preCentreId = p.get('center') || null;
});

// ── PAVÉ NUMÉRIQUE ──
function kp(d) { if (pin.length >= 6) return; pin.push(d); updatePin(); }
function kd() { if (!pin.length) return; pin.pop(); updatePin(); }

function updatePin() {
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById(`pd-${i}`);
    if (pin[i] !== undefined) {
      el.textContent = '●'; el.classList.add('filled'); el.classList.remove('active');
    } else {
      el.textContent = '—'; el.classList.remove('filled', 'active');
    }
  }
  if (pin.length < 6) document.getElementById(`pd-${pin.length}`)?.classList.add('active');
  document.getElementById('key-ok').disabled = pin.length !== 6;
}

// Clavier physique
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') kp(e.key);
  else if (e.key === 'Backspace') kd();
  else if (e.key === 'Enter' && pin.length === 6) verifyPin();
});

// ── VÉRIFICATION PIN ──
async function verifyPin() {
  if (pin.length !== 6) return;
  const errEl = document.getElementById('pin-err');
  errEl.classList.add('hidden');
  document.getElementById('pin-loading').classList.remove('hidden');
  document.getElementById('key-ok').disabled = true;

  const pinStr = pin.join('');
  const centerId = window.preCentreId || null;

  try {
    try { await supabase.auth.signOut(); } catch (_) {}

    // 1) Résoudre PIN -> email via RPC SECURITY DEFINER
    const { data: rows, error: rpcErr } = await supabase.rpc('login_pin_resolve', {
      p_center_id: centerId,
      p_role: 'formateur',
      p_pin: pinStr,
    });
    if (rpcErr) throw new Error('Erreur de connexion au serveur.');

    const row = Array.isArray(rows) ? rows[0] : rows;
    if (row?.locked) throw new Error('Compte temporairement verrouillé. Réessayez dans 5 minutes.');
    if (!row?.email) {
      await supabase.rpc('login_pin_fail', { p_center_id: centerId, p_role: 'formateur', p_pin: pinStr });
      throw new Error('PIN incorrect ou compte désactivé.');
    }

    // 2) Authentification Supabase (PIN = mot de passe)
    const { error: authErr } = await supabase.auth.signInWithPassword({
      email: row.email,
      password: pinStr,
    });
    if (authErr) {
      await supabase.rpc('login_pin_fail', { p_center_id: centerId, p_role: 'formateur', p_pin: pinStr });
      throw new Error('PIN incorrect ou compte désactivé.');
    }

    try { await supabase.rpc('login_pin_success_reset'); } catch (_) {}

    // 3) Récupérer formateur + centre (RLS authenticated -> filtré par centre du JWT)
    const { data: { user } } = await supabase.auth.getUser();
    const { data: formateur, error: selErr } = await supabase
      .from('formateurs')
      .select('*, centers(id, nom, plan, module_auto_entrainement, module_quiz_salle, module_challenge_cup, module_ssi_supervise, module_ssi_autoformation)')
      .eq('auth_user_id', user.id)
      .single();
    if (selErr || !formateur) throw new Error('Profil formateur introuvable.');

    document.getElementById('pin-loading').classList.add('hidden');
    doLogin(formateur);
  } catch(e) {
    document.getElementById('pin-loading').classList.add('hidden');
    errEl.textContent = '❌ ' + (e.message || 'PIN incorrect ou compte désactivé.');
    errEl.classList.remove('hidden');
    pin = []; updatePin();
    document.getElementById('key-ok').disabled = true;
  }
}

// ── AFFICHER ÉTAPE 2 ──
function showCentreStep(formateurs) {
  document.getElementById('step-pin').classList.add('hidden');
  document.getElementById('step-centre').classList.remove('hidden');
  document.getElementById('dot-1').classList.remove('active');
  document.getElementById('dot-2').classList.add('active');

  const nom = formateurs[0].prenom + ' ' + formateurs[0].nom;
  document.getElementById('step2-subtitle').textContent = `Bonjour ${nom} ! Choisissez votre centre :`;

  const list = document.getElementById('centres-list');
  list.innerHTML = formateurs.map((f, i) => `
    <div class="centre-item" id="centre-item-${i}" onclick="selectCentre(${i})">
      <div class="centre-icon">🏢</div>
      <div>
        <div style="font-weight:700;font-size:.9rem;color:#111827;">${f.centers?.nom || '—'}</div>
        <div style="font-size:.72rem;color:#6b7280;margin-top:2px;">Plan ${f.centers?.plan || '—'} · ${f.role}</div>
      </div>
    </div>`).join('');
}

// ── SÉLECTIONNER CENTRE ──
function selectCentre(idx) {
  selectedFormateur = foundFormateurs[idx];
  document.querySelectorAll('.centre-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('btn-confirm').disabled = false;
}

// ── CONFIRMER ──
async function confirmCentre() {
  if (!selectedFormateur) return;
  const btnEl = document.getElementById('btn-confirm');
  btnEl.disabled = true;
  document.getElementById('btn-confirm-label').innerHTML = '<span class="spin"></span>';
  document.getElementById('centre-err').classList.add('hidden');
  doLogin(selectedFormateur);
}

// ── LOGIN FINAL ──
function doLogin(formateur) {
  SESSION.save('formateur', {
    formateur_id: formateur.id,
    formateur_nom: `${formateur.prenom} ${formateur.nom}`,
    center_id: formateur.center_id,
    center_nom: formateur.centers?.nom || '',
    role_formateur: formateur.role,
    modules: formateur.centers || {}
  });
  window.location.href = 'formateur.html';
}

// ── RETOUR ──
function backToPin() {
  document.getElementById('step-centre').classList.add('hidden');
  document.getElementById('step-pin').classList.remove('hidden');
  document.getElementById('dot-1').classList.add('active');
  document.getElementById('dot-2').classList.remove('active');
  document.getElementById('centres-list').innerHTML = '';
  document.getElementById('btn-confirm').disabled = true;
  selectedFormateur = null;
  pin = []; updatePin();
}
</script>
</body>
</html>
