<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SSIAP Patrol — Connexion</title>
<meta name="theme-color" content="#F8FAFC">
<link rel="icon" href="/logo/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="mib-design.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>

<style>
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(16, 185, 129, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 100%, rgba(37, 99, 235, 0.08) 0%, transparent 60%),
      var(--bg-page);
    display: flex; align-items: center; justify-content: center;
    padding: var(--space-4);
  }
  .card {
    position: relative;
    overflow: hidden;
    background: var(--bg-surface);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(15, 23, 42, 0.08);
    padding: var(--space-8);
    width: 100%; max-width: 360px;
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 30px 80px -20px rgba(15, 23, 42, 0.25);
    animation: fadeIn 0.3s ease-out;
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: var(--gradient-primary);
    z-index: 1;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  .logo {
    width: 72px; height: 72px;
    border-radius: var(--radius-lg);
    background: var(--gradient-primary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto var(--space-5);
    color: #fff;
    font-size: 1.8rem;
    box-shadow: 0 8px 24px -4px rgba(16, 185, 129, 0.45);
  }

  .card h1 {
    text-align: center;
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-extrabold);
    color: var(--text-1);
    letter-spacing: var(--tracking-tight);
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: var(--text-3); font-size: var(--text-sm); margin-bottom: var(--space-6); }

  .field-group { display: flex; flex-direction: column; gap: var(--space-4); }
  .field-label {
    display: block;
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: var(--tracking-wide);
    margin-bottom: var(--space-2);
  }
  .input {
    width: 100%;
    padding: 13px 16px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: var(--text-base);
    outline: none;
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    background: #fff;
    color: var(--text-1);
  }
  .input:hover { border-color: var(--border-strong); }
  .input:focus { border-color: var(--vigil-500); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
  select.input { cursor: pointer; -webkit-appearance: none; appearance: none; }
  option { padding: 8px; }

  .btn-login {
    width: 100%;
    padding: var(--space-4);
    min-height: 48px;
    background: var(--gradient-primary);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    cursor: pointer;
    transition: all var(--duration-fast);
    display: flex; align-items: center; justify-content: center; gap: var(--space-2);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.25) inset,
      0 6px 14px -4px rgba(16, 185, 129, 0.45);
  }
  .btn-login:hover:not(:disabled) { background: var(--gradient-primary-hover); transform: translateY(-1px); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .spin {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255, 255, 255, 0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: sp 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  .err {
    background: var(--danger-50);
    border: 1px solid var(--danger-200);
    border-left: 4px solid var(--danger-500);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    color: var(--danger-800);
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    margin-bottom: var(--space-3);
    display: none;
  }

  .rondier-btn {
    width: 100%;
    padding: var(--space-3);
    background: #fff;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    cursor: pointer;
    color: var(--text-2);
    transition: all var(--duration-fast);
    display: flex; align-items: center; justify-content: center; gap: var(--space-2);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9) inset,
      0 2px 6px -1px rgba(15, 23, 42, 0.08);
  }
  .rondier-btn:hover {
    background: var(--vigil-50);
    color: var(--vigil-700);
    border-color: var(--vigil-300);
  }

  .footer-sep {
    margin-top: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px solid var(--border-subtle);
  }
</style>
</head>
<body>
<a href="/index.html" aria-label="Accueil MIBsoft" data-mib-logo style="position:fixed;left:12px;bottom:12px;z-index:2147483000;display:block;line-height:0;opacity:.9;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))"><img src="/logo/icon.png" alt="MIBsoft" width="34" height="34" style="display:block"></a>

<div class="card">
  <div class="logo" aria-hidden="true">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
    </svg>
  </div>
  <h1>SSIAP Patrol</h1>
  <p class="subtitle" id="subtitle">Chargement...</p>

  <div class="err" id="err-msg"></div>

  <div class="field-group">
    <div>
      <label class="field-label">Agent</label>
      <select id="sel-agent" class="input">
        <option value="">Chargement des agents...</option>
      </select>
    </div>
    <div>
      <label class="field-label">Code PIN</label>
      <div style="position:relative"><input type="password" id="inp-pin" class="input" placeholder="••••••" maxlength="6" inputmode="numeric" style="padding-right:40px"><button type="button" tabindex="-1" onclick="var i=document.getElementById('inp-pin');i.type=i.type==='password'?'text':'password'" aria-label="Afficher/masquer" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;font-size:16px;opacity:.6;padding:2px;line-height:1">👁</button></div>
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
        <polyline points="10 17 15 12 10 7"></polyline>
        <line x1="15" y1="12" x2="3" y2="12"></line>
      </svg>
      Se connecter
    </button>
  </div>

  <div class="footer-sep">
    <button class="rondier-btn" onclick="accesRondier()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
      </svg>
      Accès Rondier Mobile
    </button>
  </div>
</div>

<script>
var CENTER = null;
var DB_AGENTS = [];

window.addEventListener("DOMContentLoaded", async function() {
  var params = new URLSearchParams(window.location.search);
  var centerId = params.get("center");
  var sessionId = params.get("session");

  if (!centerId) {
    document.getElementById("subtitle").textContent = "Lien invalide";
    showErr("Utilisez le lien fourni par votre centre de formation.");
    return;
  }

  document.getElementById("subtitle").textContent = "Chargement...";

  try {
    var cr = await window.supabase.from("centers").select("id,nom,logo_url,module_patrol").eq("id", centerId).single();
    if (!cr.data) { showErr("Centre introuvable."); return; }
    CENTER = cr.data;
    document.getElementById("subtitle").textContent = CENTER.nom || "Connexion";

    // PIN compare cote serveur : la liste ne contient AUCUN PIN (ni clair ni hash).
    var alr = await window.supabase.rpc("patrol_agents_list", { p_center_id: centerId, p_session_id: sessionId || null });
    DB_AGENTS = (alr.data || []).map(function(a){
      return { id:a.id, nom:a.nom, prenom:a.prenom, qualification:a.qualification||"Agent", actif:true, type:a.type||"agent", entreprise:a.entreprise||"" };
    });

    DB_AGENTS.sort(function(a,b){
      var o = {"SSIAP 3":0,"SSIAP 2":1,"SSIAP 1":2,"Administrateur":-1};
      return ((o[a.qualification]===undefined?3:o[a.qualification])) - ((o[b.qualification]===undefined?3:o[b.qualification]));
    });

    var sel = document.getElementById("sel-agent");
    sel.innerHTML = "<option value=\"\">Sélectionner un agent...</option>";
    DB_AGENTS.forEach(function(a){
      var o = document.createElement("option");
      o.value = a.id;
      o.textContent = a.prenom + " " + a.nom + " — " + a.qualification;
      sel.appendChild(o);
    });

  } catch(e) {
    console.error(e);
    showErr("Erreur de chargement. Vérifiez votre connexion.");
  }
});

async function doLogin() {
  var agentId = document.getElementById("sel-agent").value;
  var pin = document.getElementById("inp-pin").value;
  if (!agentId) { showErr("Sélectionnez un agent."); return; }
  if (!pin) { showErr("Entrez votre code PIN."); return; }

  var btn = document.getElementById("btn-login");
  btn.innerHTML = "<span class=\"spin\"></span>";
  btn.disabled = true;
  hideErr();

  var agent = DB_AGENTS.find(function(a){ return String(a.id) === String(agentId); });
  if (!agent) { showErr("Agent introuvable."); restoreBtn(); return; }

  var rr;
  try {
    rr = await window.supabase.rpc("patrol_resolve", {
      p_center_id: CENTER.id,
      p_session_id: new URLSearchParams(window.location.search).get("session") || null,
      p_agent_id: String(agentId),
      p_pin: pin
    });
  } catch(e){ console.error(e); }
  var row = (rr && rr.data && rr.data[0]) ? rr.data[0] : null;
  if (!row || (rr && rr.error)) { showErr("Erreur de connexion. Réessayez."); restoreBtn(); return; }
  if (row.locked) { showErr("Trop de tentatives. Réessayez dans quelques minutes."); restoreBtn(); return; }
  if (!row.ok) { showErr("Code PIN incorrect."); restoreBtn(); return; }
  // Identite faisant autorite (renvoyee par le serveur)
  agent.nom = row.nom || agent.nom;
  agent.prenom = row.prenom || agent.prenom;
  agent.qualification = row.qualification || agent.qualification;
  agent.type = row.type || agent.type;

  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get("session") || null;
  var patrolSession = {
    agentId: agent.id, nom: agent.nom, prenom: agent.prenom,
    qualification: agent.qualification, type: agent.type || "agent",
    centerId: CENTER.id, centerNom: CENTER.nom,
    sessionId: sessionId, ts: Date.now()
  };
  sessionStorage.setItem("patrol_session", JSON.stringify(patrolSession));

  var base = window.location.href.replace(/patrol-login\.html.*/, "");
  window.location.href = base + "patrol-rondier.html";
}

function restoreBtn() {
  var btn = document.getElementById("btn-login");
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Se connecter';
  btn.disabled = false;
}

function accesRondier() {
  var params = new URLSearchParams(window.location.search);
  var centerId = params.get("center");
  var sessionId = params.get("session");
  if (CENTER) {
    var url = "patrol-rondier.html?center=" + centerId + (sessionId?"&session="+sessionId:"");
    window.location.href = url;
  }
}

function showErr(msg) {
  var el = document.getElementById("err-msg");
  el.textContent = msg; el.style.display = "block";
  restoreBtn();
}
function hideErr() { document.getElementById("err-msg").style.display = "none"; }

document.addEventListener("keydown", function(e){
  if(e.key==="Enter") doLogin();
});
</script>
</body>
</html>
