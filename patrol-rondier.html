<style>
/* ============================================================
   SSIAP Patrol Rondier (mobile) — refonte Vigil
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0;}

/* Legacy aliases */
:root{
  --bg:var(--bg-page);
  --text:var(--text-1);
}

body{
  font-family:var(--font-body);
  color:var(--text-1);
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(37,99,235,0.06) 0%, transparent 60%),
    var(--bg-page);
  padding-bottom:84px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

h1,h2,h3,h4{font-family:var(--font-display);font-weight:800;letter-spacing:-0.02em;color:var(--text-1);}

/* ============ HEADER ============ */
.header{
  background:var(--gradient-primary);
  color:#fff;
  padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  box-shadow:0 4px 16px -4px rgba(15,23,42,0.20);
}
.header > div:first-child > div:first-child{
  background:rgba(255,255,255,0.18) !important;
  backdrop-filter:blur(8px);
}
.header #hdr-nom{font-family:var(--font-display);}
.header button{
  background:rgba(255,255,255,0.18) !important;
  backdrop-filter:blur(8px);
  transition:background .15s;
}
.header button:hover{background:rgba(255,255,255,0.28) !important;}

/* ============ PAGES ============ */
.page{display:none;padding:16px;}
.page.active{display:block;}
.hidden{display:none !important;}

/* ============ CARDS ============ */
.card{
  position:relative;overflow:hidden;
  background:var(--bg-surface);
  border-radius:var(--radius-lg);
  border:1px solid rgba(15,23,42,0.08);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.9) inset,
    0 4px 12px -2px rgba(15,23,42,0.10),
    0 2px 4px -1px rgba(15,23,42,0.06);
  padding:18px;
  margin-bottom:14px;
}
.card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:var(--gradient-primary);
  z-index:1;
}

/* ============ BUTTONS (mobile, touch-friendly 48px+) ============ */
.btn{
  padding:13px 18px;min-height:48px;
  border-radius:var(--radius-md);border:none;
  font-weight:700;font-size:.92rem;
  cursor:pointer;
  transition:transform .12s, box-shadow .12s, background .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font-body);
  width:100%;
  line-height:1.1;
}
.btn:active{transform:scale(0.97);}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(16,185,129,0.30);}

.btn-primary{
  background:var(--gradient-primary);color:#fff;
  box-shadow:0 8px 20px -6px rgba(16,185,129,0.50);
}
.btn-primary:hover{background:var(--gradient-primary-hover);}
.btn-green{
  background:var(--vigil-600);color:#fff;
  box-shadow:0 4px 12px -2px rgba(5,150,105,0.35);
}
.btn-green:hover{background:var(--vigil-700);}
.btn-red{background:var(--danger-600);color:#fff;}
.btn-red:hover{background:var(--danger-700);}
.btn-orange{background:var(--warning-600);color:#fff;}
.btn-orange:hover{background:var(--warning-700);}
.btn-gray{
  background:#fff;color:var(--text-2);
  border:1px solid var(--border-default);
}
.btn-gray:hover{background:var(--neutral-50);}
.btn-big{
  padding:22px;border-radius:var(--radius-xl);
  font-size:1.05rem;font-weight:800;
  min-height:64px;
}

/* ============ INPUTS ============ */
.input{
  width:100%;padding:13px 14px;min-height:48px;
  border:1.5px solid var(--border-default);
  border-radius:var(--radius-md);
  font-size:1rem;font-family:var(--font-body);
  color:var(--text-1);
  background:#fff;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.input:focus{
  border-color:var(--vigil-500);
  box-shadow:0 0 0 3px rgba(16,185,129,0.15);
}
.input::placeholder{color:var(--text-4);}
textarea.input{min-height:80px;line-height:1.4;}

/* ============ BADGES ============ */
.badge{
  display:inline-block;padding:3px 10px;
  border-radius:999px;font-size:.68rem;font-weight:700;
  letter-spacing:0.02em;
}
.b-green{background:var(--success-50);color:var(--success-700);border:1px solid var(--vigil-200);}
.b-orange{background:var(--warning-50);color:var(--warning-700);border:1px solid var(--warning-200);}
.b-red{background:var(--danger-50);color:var(--danger-700);border:1px solid var(--danger-200);}
.b-blue{background:var(--info-50);color:var(--info-700);border:1px solid var(--marine-200);}
.b-gray{background:var(--neutral-50);color:var(--text-3);border:1px solid var(--border-default);}

/* ============ BOTTOM NAV ============ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--border-subtle);
  display:flex;z-index:50;
  box-shadow:0 -8px 24px -8px rgba(15,23,42,0.10);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:12px 0;min-height:60px;
  cursor:pointer;color:var(--text-3);
  font-size:.7rem;font-weight:600;
  transition:color .15s;
  border:none;background:none;
  font-family:var(--font-body);
  position:relative;
}
.nav-btn.active{color:var(--vigil-700);}
.nav-btn.active::before{
  content:'';position:absolute;
  top:0;left:30%;right:30%;height:3px;
  background:var(--gradient-primary);
  border-radius:0 0 3px 3px;
}
.nav-btn i{font-size:1.25rem;margin-bottom:3px;}

/* ============ PROGRESS ============ */
.progress-bar{
  height:8px;
  background:rgba(15,23,42,0.10);
  border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg, var(--vigil-400) 0%, var(--vigil-500) 50%, var(--marine-500) 100%);
  transition:width .4s ease;
  box-shadow:0 0 12px rgba(16,185,129,0.45);
}

/* En-tête de mission (gradient brand) : remplacé inline mais on prépare */
/* ============ MODALS — bottom sheet sur mobile ============ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(15,23,42,0.55);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:100;
  display:flex;align-items:flex-end;
  padding:0;
}
.modal-box{
  position:relative;overflow:hidden;
  background:#fff;
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  padding:24px;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
  width:100%;max-height:92vh;
  overflow-y:auto;
  animation:slideUp .25s ease;
  box-shadow:0 -20px 60px -10px rgba(15,23,42,0.30);
}
.modal-box::before{
  content:'';position:sticky;display:block;
  top:0;left:-24px;right:-24px;
  margin:-24px -24px 16px;height:3px;
  background:var(--gradient-primary);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Bouton fermer modal (✕) */
.modal-box button[onclick*="closeModal"]:not(.btn),
.modal-box button[onclick*="stopScan"]{
  background:var(--neutral-100) !important;
  color:var(--text-2) !important;
  border:none !important;
}

/* ============ TOAST ============ */
.toast{
  position:fixed;top:80px;left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--neutral-800);color:#fff;
  padding:11px 20px;
  border-radius:var(--radius-md);
  font-size:.85rem;font-weight:600;
  opacity:0;transition:opacity .25s, transform .25s;
  z-index:999;pointer-events:none;white-space:nowrap;
  box-shadow:0 12px 28px -6px rgba(15,23,42,0.35);
  max-width:90vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--vigil-600);}
.toast.err{background:var(--danger-600);}

/* ============ ANIM ============ */
.fade-in{animation:fadeIn .22s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Forcer hit-targets larges pour gants */
button, .nav-btn, [role="button"]{
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>
<a href="/index.html" aria-label="Accueil MIBsoft" data-mib-logo style="position:fixed;left:12px;bottom:12px;z-index:2147483000;display:block;line-height:0;opacity:.9;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))"><img src="/logo/icon.png" alt="MIBsoft" width="34" height="34" style="display:block"></a>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;">
      <i class="fas fa-walking"></i>
    </div>
    <div>
      <div style="font-weight:800;font-size:.9rem;" id="hdr-nom">Rondier</div>
      <div style="font-size:.72rem;opacity:.8;" id="hdr-centre">En service</div>
    </div>
  </div>
  <button onclick="logout()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 12px;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;">
    <i class="fas fa-sign-out-alt"></i>

</div>

<!-- PAGE RONDES -->
<div id="page-rondes" class="page active"></div>

<!-- PAGE MATERIELS -->

<!-- PAGE CONSIGNES -->
<div id="page-consignes" class="page"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-rondes" onclick="showPage('rondes')">
    <i class="fas fa-route"></i>Rondes
  </button>
  <button class="nav-btn" id="nav-materiels" onclick="showPage('materiels')">

  <button class="nav-btn" id="nav-consignes" onclick="showPage('consignes')">
    <i class="fas fa-file-alt"></i>Consignes
  </button>
</nav>

<!-- MODAL ANOMALIE -->
<div id="modal-anomalie" class="modal-bg hidden">
  <div class="modal-box">
    <div style="font-size:1rem;font-weight:800;margin-bottom:16px;">⚠️ Signaler une anomalie</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div><label style="font-size:.75rem;font-weight:700;color:#64748b;display:block;margin-bottom:5px;">Localisation</label><input type="text" id="ano-loc" class="input" placeholder="Ou se trouve l'anomalie ?"></div>
      <div><label style="font-size:.75rem;font-weight:700;color:#64748b;display:block;margin-bottom:5px;">Description *</label><textarea id="ano-desc" class="input" rows="3" placeholder="Decrivez le probleme..."></textarea></div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeModal()" class="btn btn-gray" style="flex:1;">Annuler</button>
        <button onclick="saveAnomalie(false)" class="btn btn-orange" style="flex:1;">Anomalie</button>
        <button onclick="saveAnomalie(true)" class="btn btn-red" style="flex:1;">Hors Service</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL SCAN -->
<div id="modal-scan" class="modal-bg hidden">
  <div class="modal-box">
    <div style="font-size:1rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
      <span>Scanner un point</span>
      <button onclick="stopScan()" style="background:#f1f5f9;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:.8rem;color:#64748b;">Fermer</button>
    </div>
    <div id="qr-reader" style="width:100%;border-radius:12px;overflow:hidden;min-height:200px;"></div>
    <div id="scan-result" style="text-align:center;padding:10px;font-size:.85rem;color:#64748b;"></div>
    <div style="margin-top:12px;">
      <label style="font-size:.75rem;font-weight:700;color:#64748b;display:block;margin-bottom:5px;">Ou saisir le code manuellement</label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="qr-manuel" class="input" placeholder="MAT-EXT-001" style="flex:1;">
        <button onclick="validerQRManuel()" class="btn btn-primary" style="width:auto;padding:10px 14px;"><i class="fas fa-check"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL VALIDATION POINT -->
<div id="modal-validation" class="modal-bg hidden">
  <div class="modal-box">
    <div id="val-point-info" style="background:#eff6ff;padding:14px;border-radius:12px;margin-bottom:16px;"></div>
    <div style="font-weight:700;margin-bottom:12px;">Etat du point :</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <button onclick="validerPoint('OK')" style="padding:16px 8px;background:#f0fdf4;border:2px solid #bbf7d0;border-radius:14px;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s;" onmouseover="this.style.background='#059669';this.style.color='#fff'" onmouseout="this.style.background='#f0fdf4';this.style.color='inherit'">
        <div style="font-size:1.4rem;margin-bottom:4px;">✅</div><div style="font-size:.78rem;font-weight:700;color:#16a34a;">Conforme</div>
      </button>
      <button onclick="validerPoint('Anomalie')" style="padding:16px 8px;background:#fff7ed;border:2px solid #fed7aa;border-radius:14px;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s;" onmouseover="this.style.background='#f59e0b';this.style.color='#fff'" onmouseout="this.style.background='#fff7ed';this.style.color='inherit'">
        <div style="font-size:1.4rem;margin-bottom:4px;">⚠️</div><div style="font-size:.78rem;font-weight:700;color:#ea580c;">Anomalie</div>
      </button>
      <button onclick="validerPoint('HS')" style="padding:16px 8px;background:#fef2f2;border:2px solid #fecaca;border-radius:14px;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s;" onmouseover="this.style.background='#dc2626';this.style.color='#fff'" onmouseout="this.style.background='#fef2f2';this.style.color='inherit'">
        <div style="font-size:1.4rem;margin-bottom:4px;">🚫</div><div style="font-size:.78rem;font-weight:700;color:#dc2626;">Hors Service</div>
      </button>
    </div>
    <button onclick="closeModal()" class="btn btn-gray" style="margin-top:12px;">Annuler</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
var sb = window.supabase;
var PATROL_SESSION = null;
var CENTER = null;
var DATA = { agents:[], materiels:[], prisesPoste:[], rondes:[], evenements:[], mainCourante:[], consignes:[] };
var html5QrScanner = null;
var currentRondeId = null;
var currentPointId = null;
var valStatutPending = null;

// ═══ INIT ═══
window.addEventListener("DOMContentLoaded", async function() {
  PATROL_SESSION = JSON.parse(sessionStorage.getItem("patrol_session") || "null");

  if (!PATROL_SESSION || !PATROL_SESSION.centerId) {
    var params = new URLSearchParams(window.location.search);
    var centerId = params.get("center");
    var sessionId = params.get("session");
    if (centerId) {
      window.location.href = "patrol-login.html?center="+centerId+(sessionId?"&session="+sessionId:"");
    } else {
      document.body.innerHTML = "<div style='padding:40px;text-align:center;color:#94a3b8;'>Session expiree. <a href='patrol-login.html'>Reconnexion</a></div>";
    }
    return;
  }

  document.getElementById("hdr-nom").textContent = PATROL_SESSION.prenom + " " + PATROL_SESSION.nom;
  document.getElementById("hdr-centre").textContent = PATROL_SESSION.centerNom || "En service";

  await chargerDonnees();
  showPage("rondes");
  activerSync();
});

async function chargerDonnees() {
  var q = sb.from("patrol_data").select("*").eq("center_id", PATROL_SESSION.centerId);
  if (PATROL_SESSION.sessionId) q = q.eq("session_id", PATROL_SESSION.sessionId);
  else q = q.is("session_id", null);
  var {data} = await q.maybeSingle();
  if (data) {
    if (data.agents)        DATA.agents       = data.agents;
    if (data.materiels)     DATA.materiels    = data.materiels;
    if (data.prises_poste)  DATA.prisesPoste  = data.prises_poste;
    if (data.rondes)        DATA.rondes       = data.rondes;
    if (data.consignes)     DATA.consignes    = data.consignes;
    if (data.main_courante) DATA.mainCourante = data.main_courante;
  }
}

async function sauvegarder() {
  var payload = {
    center_id: PATROL_SESSION.centerId,
    session_id: PATROL_SESSION.sessionId || null,
    agents: DATA.agents,
    materiels: DATA.materiels,
    prises_poste: DATA.prisesPoste,
    rondes: DATA.rondes,
    evenements: DATA.evenements,
    main_courante: DATA.mainCourante.slice(0,500),
    consignes: DATA.consignes,
    updated_at: new Date().toISOString()
  };
  await sb.from("patrol_data").upsert(payload, {onConflict:"center_id,session_id"});
}

var syncChannel = null;
function activerSync() {
  var key = "patrol-" + PATROL_SESSION.centerId + (PATROL_SESSION.sessionId ? "-"+PATROL_SESSION.sessionId : "");
  syncChannel = sb.channel(key, {config:{broadcast:{self:false}}})
    .on("broadcast", {event:"update"}, async function() {
      await chargerDonnees();
      renderCurrentPage();
    }).subscribe();
}

// ═══ NAVIGATION ═══
var PAGES = ["rondes","materiels","consignes"];
function showPage(name) {
  PAGES.forEach(function(p) {
    document.getElementById("page-"+p).className = "page"+(p===name?" active fade-in":"");
    document.getElementById("nav-"+p).className = "nav-btn"+(p===name?" active":"");
  });
  if (name==="rondes")    renderRondes();
  if (name==="materiels") renderMateriels();
  if (name==="consignes") renderConsignes();
}
function renderCurrentPage() {
  var active = PAGES.find(function(p){ return document.getElementById("page-"+p).classList.contains("active"); });
  if (active) showPage(active);
}

// ═══ RONDES ═══
function renderRondes() {
  var el = document.getElementById("page-rondes");
  var mesRondes = DATA.rondes.filter(function(r){ return String(r.agentId)===String(PATROL_SESSION.agentId) && !r.heureFin; });
  var stats = {
    total: DATA.rondes.filter(function(r){ return String(r.agentId)===String(PATROL_SESSION.agentId); }).length,
    terminees: DATA.rondes.filter(function(r){ return String(r.agentId)===String(PATROL_SESSION.agentId) && r.heureFin; }).length
  };

  if (mesRondes.length > 0) {
    var r = mesRondes[0];
    var pts = (r.pointsControle||[]).filter(function(p){ return p.valide; }).length;
    var tot = (r.pointsControle||[]).length;
    var pct = tot > 0 ? Math.round(pts/tot*100) : 0;
    el.innerHTML = "<div class=\"fade-in\">"
      + "<div style=\"background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:20px;padding:22px;margin-bottom:14px;\">"
      + "<div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">"
      + "<div style=\"width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;\">🚶</div>"
      + "<div><div style=\"font-weight:800;font-size:.95rem;\">"+esc(r.nom||r.type)+"</div><div style=\"font-size:.75rem;opacity:.85;\">"+esc(r.zone||"")+"</div></div>"
      + "</div>"
      + "<div class=\"progress-bar\" style=\"margin-bottom:8px;\"><div class=\"progress-fill\" style=\"width:"+pct+"%;\"></div></div>"
      + "<div style=\"text-align:center;font-size:.83rem;margin-bottom:16px;\">"+pts+"/"+tot+" points valides</div>"
      + "<button onclick=\"ouvrirScan("+r.id+")\" style=\"width:100%;padding:20px;background:#fff;color:#d97706;border:none;border-radius:14px;font-weight:800;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;\">"
      + "<i class=\"fas fa-qrcode\" style=\"font-size:1.3rem;\"></i> Scanner un point</button>"
      + "<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">"
      + "<button onclick=\"voirPointsRonde("+r.id+")\" style=\"padding:14px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:12px;font-weight:700;cursor:pointer;font-family:inherit;\"><i class=\"fas fa-list\"></i> Points</button>"
      + "<button onclick=\"terminerRonde("+r.id+")\" style=\"padding:14px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:12px;font-weight:700;cursor:pointer;border:2px solid rgba(255,255,255,.5);font-family:inherit;\"><i class=\"fas fa-flag-checkered\"></i> Terminer</button>"
      + "</div></div>"
      + "<button onclick=\"ouvrirModalAnomalie("+r.id+")\" class=\"card\" style=\"width:100%;display:flex;align-items:center;gap:12px;text-align:left;border:none;cursor:pointer;\">"
      + "<div style=\"width:42px;height:42px;background:#fef2f2;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><i class=\"fas fa-exclamation-triangle\" style=\"color:#dc2626;\"></i></div>"
      + "<div><div style=\"font-weight:700;font-size:.85rem;\">Signaler une anomalie</div><div style=\"font-size:.72rem;color:#94a3b8;\">Hors point de controle</div></div>"
      + "<i class=\"fas fa-chevron-right\" style=\"color:#e2e8f0;margin-left:auto;\"></i></button>"
      + "</div>";
  } else {
    el.innerHTML = "<div class=\"fade-in\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;\">"
      + "<button onclick=\"nouvelleRonde()\" style=\"width:100%;max-width:320px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:24px;padding:30px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,.4);\">"
      + "<div style=\"width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;\"><i class=\"fas fa-play\"></i></div>"
      + "<div style=\"font-size:1.2rem;font-weight:800;\">Nouvelle Ronde</div>"
      + "<div style=\"font-size:.82rem;opacity:.85;\">Appuyez pour commencer</div></button>"
      + "<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px;\">"
      + "<div class=\"card\" style=\"text-align:center;\"><div style=\"font-size:1.6rem;font-weight:800;color:#10b981;\">"+stats.terminees+"</div><div style=\"font-size:.72rem;color:#94a3b8;\">Terminees</div></div>"
      + "<div class=\"card\" style=\"text-align:center;\"><div style=\"font-size:1.6rem;font-weight:800;color:#6366f1;\">"+stats.total+"</div><div style=\"font-size:.72rem;color:#94a3b8;\">Total</div></div>"
      + "</div>"
      + "<button onclick=\"syncRondier()\" class=\"btn btn-gray\" style=\"max-width:200px;\"><i class=\"fas fa-sync-alt\"></i> Synchroniser</button>"
      + "</div>";
  }
}

async function syncRondier() {
  toast("Synchronisation...");
  await chargerDonnees();
  renderRondes();
  toast("Synchronise !", "ok");
}

function nouvelleRonde() {
  // Verifier prise de poste
  var enPoste = DATA.prisesPoste.find(function(p){ return String(p.agentId)===String(PATROL_SESSION.agentId) && !p.finPoste; });
  if (!enPoste) {
    showInfo("Prise de poste requise", "Effectuez votre prise de poste au PC Securite avant de commencer une ronde.");
    return;
  }

  // Creer une ronde avec les zones de l'etablissement (si disponibles)
  var points = [];
  var config = window._patrolConfig || {batiments:[]};
  if (DATA.materiels && DATA.materiels.length) {
    // Ronde par materiels
    DATA.materiels.forEach(function(m){
      points.push({ id:genId(), nom:m.nom, materielId:m.id, localisation:m.localisation, qrCode:m.codeQR||"MAT-"+m.id, valide:false, heureValidation:null, statut:null });
    });
  }

  if (!points.length) {
    showInfo("Aucun point de controle", "Demandez au formateur de configurer les materiels et points de controle.");
    return;
  }

  var ronde = { id:genId(), type:"Ronde de securite", nom:"Ronde "+(new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})), zone:"Etablissement", agentId:PATROL_SESSION.agentId, heureDebut:new Date().toISOString(), heureFin:null, pointsControle:points, anomalies:[] };
  DATA.rondes.push(ronde);
  addMC("Depart Ronde", ronde.nom+" - "+points.length+" points", PATROL_SESSION.agentId);
  sauvegarder().then(function(){ toast("Ronde demarree ! "+points.length+" points","ok"); renderRondes(); });
}

function ouvrirScan(rondeId) {
  currentRondeId = rondeId;
  document.getElementById("qr-manuel").value = "";
  document.getElementById("scan-result").textContent = "";
  document.getElementById("modal-scan").classList.remove("hidden");
  setTimeout(function(){ demarrerScan(rondeId); }, 300);
}

function demarrerScan(rondeId) {
  if (typeof Html5Qrcode === "undefined") return;
  if (html5QrScanner) { try{html5QrScanner.stop();}catch(e){} html5QrScanner=null; }
  html5QrScanner = new Html5Qrcode("qr-reader");
  html5QrScanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:{width:240,height:240}},
    function(code) {
      if (navigator.vibrate) navigator.vibrate(200);
      html5QrScanner.stop().then(function(){ html5QrScanner=null; });
      traiterQR(rondeId, code);
    },
    function(){}
  ).then(function(){
    document.getElementById("scan-result").textContent = "Pointez vers un QR code";
  }).catch(function(e){
    document.getElementById("scan-result").textContent = "Camera non disponible — saisie manuelle";
  });
}

function stopScan() {
  if (html5QrScanner) { try{html5QrScanner.stop();}catch(e){} html5QrScanner=null; }
  document.getElementById("modal-scan").classList.add("hidden");
}

function validerQRManuel() {
  var code = document.getElementById("qr-manuel").value.trim();
  if (!code) { toast("Entrez un code","err"); return; }
  stopScan();
  traiterQR(currentRondeId, code);
}

function traiterQR(rondeId, code) {
  var r = DATA.rondes.find(function(x){ return x.id===rondeId; });
  if (!r) return;
  var codeNorm = code.trim().toUpperCase();
  var point = (r.pointsControle||[]).find(function(p){ return (p.qrCode||"").toUpperCase()===codeNorm; });
  if (!point) { toast("Code non reconnu","err"); return; }
  if (point.valide) { toast("Point deja valide","err"); return; }
  currentRondeId = rondeId;
  currentPointId = point.id;
  document.getElementById("val-point-info").innerHTML = "<div style=\"font-weight:700;font-size:.9rem;color:#1e293b;\">"+esc(point.nom)+"</div><div style=\"font-size:.75rem;color:#64748b;margin-top:3px;\">"+esc(point.localisation||"")+"</div><div style=\"font-family:monospace;font-size:.7rem;color:#94a3b8;margin-top:4px;\">"+point.qrCode+"</div>";
  document.getElementById("modal-validation").classList.remove("hidden");
}

async function validerPoint(statut) {
  var r = DATA.rondes.find(function(x){ return x.id===currentRondeId; });
  if (!r) return;
  var point = (r.pointsControle||[]).find(function(p){ return p.id===currentPointId; });
  if (!point) return;
  closeModal();

  if (statut === "OK") {
    point.valide=true; point.heureValidation=new Date().toISOString(); point.statut="OK";
    if (point.materielId) {
      var mat = DATA.materiels.find(function(m){ return m.id===point.materielId; });
      if (mat) { mat.statut="Operationnel"; mat.dernierControle=new Date().toISOString().split("T")[0]; }
    }
    addMC("Ronde", "Point validé OK : "+point.nom+(point.localisation?" ("+point.localisation+")":""), PATROL_SESSION.agentId);
    if (navigator.vibrate) navigator.vibrate(150);
    await sauvegarder(); toast("✅ "+point.nom+" valide !","ok"); renderRondes();
  } else {
    // Demander description anomalie
    currentRondeId = r.id; currentPointId = point.id; valStatutPending = statut;
    document.getElementById("ano-desc").value="";
    document.getElementById("ano-loc").value=point.nom+(point.localisation?" - "+point.localisation:"");
    setTimeout(function(){ document.getElementById("modal-anomalie").classList.remove("hidden"); }, 200);
  }
}

function ouvrirModalAnomalie(rondeId) {
  currentRondeId=rondeId; currentPointId=null; valStatutPending=null;
  document.getElementById("ano-desc").value="";
  document.getElementById("ano-loc").value="";
  document.getElementById("modal-anomalie").classList.remove("hidden");
}

async function saveAnomalie(horsService) {
  var desc = document.getElementById("ano-desc").value.trim();
  var loc  = document.getElementById("ano-loc").value.trim();
  if (!desc) { toast("Description requise","err"); return; }
  var r = DATA.rondes.find(function(x){ return x.id===currentRondeId; });
  if (!r) { closeModal(); return; }
  if (!r.anomalies) r.anomalies=[];

  // Si validation d'un point
  if (currentPointId) {
    var point = (r.pointsControle||[]).find(function(p){ return p.id===currentPointId; });
    if (point) { point.valide=true; point.heureValidation=new Date().toISOString(); point.statut=horsService?"HS":"Anomalie"; }
    r.anomalies.push({ id:genId(), pointId:currentPointId, pointNom:point?point.nom:"", description:desc, horsService:horsService, date:new Date().toISOString(), agentId:PATROL_SESSION.agentId });
    if (point && point.materielId) {
      var mat = DATA.materiels.find(function(m){ return m.id===point.materielId; });
      if (mat) { mat.statut = horsService?"Hors Service":"A verifier"; mat.observation=desc; mat.dernierControle=new Date().toISOString().split("T")[0]; }
    }
  } else {
    r.anomalies.push({ id:genId(), localisation:loc, description:desc, horsService:horsService, date:new Date().toISOString(), agentId:PATROL_SESSION.agentId });
  }

  addMC("Anomalie Ronde", (horsService?"[HS] ":"")+(loc?loc+": ":"")+desc, PATROL_SESSION.agentId);
  closeModal(); await sauvegarder(); toast(horsService?"Hors Service signale":"Anomalie signalee","ok"); renderRondes();
}

function voirPointsRonde(rondeId) {
  var r = DATA.rondes.find(function(x){ return x.id===rondeId; });
  if (!r) return;
  var valides = (r.pointsControle||[]).filter(function(p){ return p.valide; });
  var nonValides = (r.pointsControle||[]).filter(function(p){ return !p.valide; });
  showInfo("Points de controle",
    (nonValides.length ? "<div style=\"font-weight:700;font-size:.82rem;color:#dc2626;margin-bottom:8px;\">A valider ("+nonValides.length+")</div>"
    + nonValides.map(function(p){ return "<div onclick=\"ouvrirValidationPoint("+r.id+","+p.id+")\" style=\"padding:10px;background:#fef2f2;border-radius:10px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px;\"><i class=\"fas fa-circle\" style=\"color:#dc2626;font-size:.5rem;\"></i><div><div style=\"font-size:.83rem;font-weight:600;\">"+esc(p.nom)+"</div><div style=\"font-size:.72rem;color:#94a3b8;\">"+esc(p.localisation||"")+"</div></div></div>"; }).join("") : "")
    + (valides.length ? "<div style=\"font-weight:700;font-size:.82rem;color:#16a34a;margin-bottom:8px;margin-top:12px;\">Valides ("+valides.length+")</div>"
    + valides.map(function(p){ return "<div style=\"padding:10px;background:#f0fdf4;border-radius:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;\"><i class=\"fas fa-check-circle\" style=\"color:#16a34a;\"></i><div style=\"font-size:.83rem;font-weight:600;\">"+esc(p.nom)+"</div></div>"; }).join("") : "")
  );
}

function ouvrirValidationPoint(rondeId, pointId) {
  closeModal();
  currentRondeId=rondeId; currentPointId=pointId;
  var r = DATA.rondes.find(function(x){ return x.id===rondeId; });
  var point = r?(r.pointsControle||[]).find(function(p){ return p.id===pointId; }):null;
  if (!point) return;
  document.getElementById("val-point-info").innerHTML = "<div style=\"font-weight:700;font-size:.9rem;color:#1e293b;\">"+esc(point.nom)+"</div><div style=\"font-size:.75rem;color:#64748b;margin-top:3px;\">"+esc(point.localisation||"")+"</div>";
  setTimeout(function(){ document.getElementById("modal-validation").classList.remove("hidden"); }, 100);
}

function terminerRonde(rondeId) {
  var r = DATA.rondes.find(function(x){ return x.id===rondeId; });
  if (!r) return;
  var pts = (r.pointsControle||[]).filter(function(p){ return p.valide; }).length;
  var tot = (r.pointsControle||[]).length;
  if (!confirm("Terminer la ronde ?\n"+pts+"/"+tot+" points valides")) return;
  r.heureFin = new Date().toISOString();
  var duree = Math.round((new Date(r.heureFin)-new Date(r.heureDebut))/60000);
  addMC("Fin Ronde", r.nom+" ("+pts+"/"+tot+", "+duree+"min)", PATROL_SESSION.agentId);
  sauvegarder().then(function(){ toast("Ronde terminee !","ok"); renderRondes(); });
}

// ═══ MATERIELS ═══
function renderMateriels() {
  var el = document.getElementById("page-materiels");
  var stats = { ok:DATA.materiels.filter(function(m){ return m.statut==="Operationnel"; }).length, hs:DATA.materiels.filter(function(m){ return m.statut==="Hors Service"; }).length };
  if (!DATA.materiels.length) {
    el.innerHTML = "<div style=\"text-align:center;padding:60px 20px;color:#94a3b8;\"><div style=\"font-size:2rem;margin-bottom:10px;\">🧯</div><div>Aucun materiel configure</div></div>";
    return;
  }
  el.innerHTML = "<div class=\"fade-in\">"
    + "<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;\">"
    + "<div class=\"card\" style=\"text-align:center;\"><div style=\"font-size:1.4rem;font-weight:800;color:#16a34a;\">"+stats.ok+"</div><div style=\"font-size:.72rem;color:#94a3b8;\">Operationnels</div></div>"
    + "<div class=\"card\" style=\"text-align:center;\"><div style=\"font-size:1.4rem;font-weight:800;color:#dc2626;\">"+stats.hs+"</div><div style=\"font-size:.72rem;color:#94a3b8;\">Hors Service</div></div>"
    + "</div>"
    + DATA.materiels.map(function(m){
        var sc = m.statut==="Operationnel"?"b-green":m.statut==="A verifier"?"b-orange":"b-red";
        return "<div class=\"card\" style=\"display:flex;align-items:center;gap:12px;cursor:pointer;\" onclick=\"ouvrirEtatMateriel("+m.id+")\">"
          + "<div style=\"width:38px;height:38px;background:#f8fafc;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;\">🧯</div>"
          + "<div style=\"flex:1;\"><div style=\"font-weight:700;font-size:.85rem;\">"+esc(m.nom)+"</div><div style=\"font-size:.72rem;color:#94a3b8;\">"+esc(m.localisation||"—")+"</div></div>"
          + "<span class=\"badge "+sc+"\">"+m.statut+"</span><i class=\"fas fa-pen\" style=\"color:#cbd5e1;font-size:.7rem;margin-left:2px;\"></i></div>";
      }).join("")
    + "<div style=\"text-align:center;font-size:.72rem;color:#94a3b8;margin-top:10px;\">Touchez un matériel pour changer son état</div>"
    + "</div>";
}
// Changer l'état d'un matériel depuis le rondier → met à jour la table matériel + la main courante.
function ouvrirEtatMateriel(id){
  var m = DATA.materiels.find(function(x){ return String(x.id)===String(id); }); if(!m) return;
  function b(st,label,color){
    return "<button class=\"btn\" style=\"width:100%;justify-content:center;margin-bottom:8px;background:"+color+";color:#fff;\""
      +" onclick=\"this.closest('.modal-bg').remove();majEtatMateriel("+id+",'"+st+"')\">"+label+"</button>";
  }
  showInfo("État — "+esc(m.nom),
    "<div style=\"font-size:.78rem;color:#64748b;margin-bottom:12px;\">"+esc(m.localisation||"")+"</div>"
    + b("Operationnel","✅ Opérationnel","#16a34a")
    + b("A verifier","🟠 À vérifier","#d97706")
    + b("Hors Service","⛔ Hors service","#dc2626"));
}
function majEtatMateriel(id, statut){
  var note = ""; if(statut!=="Operationnel"){ note = prompt("Observation (facultatif) :","")||""; }
  setEtatMateriel(id, statut, note);
}
async function setEtatMateriel(id, statut, note){
  var m = DATA.materiels.find(function(x){ return String(x.id)===String(id); }); if(!m) return;
  m.statut = statut;
  m.dernierControle = new Date().toISOString().split("T")[0];   // contrôle = aujourd'hui
  if(note) m.observation = note;
  addMC("Contrôle matériel", m.nom+(m.localisation?" ("+m.localisation+")":"")+" → "+statut+(note?" — "+note:""), PATROL_SESSION.agentId);
  await sauvegarder(); renderMateriels(); toast("État mis à jour : "+statut,"ok");
}

// ═══ CONSIGNES ═══
function renderConsignes() {
  var el = document.getElementById("page-consignes");
  var actives = DATA.consignes.filter(function(c){ return c.active; });
  if (!actives.length) {
    el.innerHTML = "<div style=\"text-align:center;padding:60px 20px;color:#94a3b8;\"><div style=\"font-size:2rem;margin-bottom:10px;\">📋</div><div>Aucune consigne active</div></div>";
    return;
  }
  el.innerHTML = "<div class=\"fade-in\">" + actives.map(function(c){
    var col = c.niveau==="Particuliere"?"b-orange":"b-blue";
    var prio = c.priorite==="Urgente"||c.priorite==="Haute"?"b-red":"b-gray";
    return "<div class=\"card\">"
      + "<div style=\"display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;\">"
      + "<span class=\"badge "+col+"\">"+c.niveau+"</span><span class=\"badge "+prio+"\">"+c.priorite+"</span></div>"
      + "<div style=\"font-weight:700;font-size:.88rem;margin-bottom:6px;\">"+esc(c.titre)+"</div>"
      + "<div style=\"font-size:.82rem;color:#64748b;line-height:1.5;\">"+esc(c.contenu)+"</div>"
      + "</div>";
  }).join("") + "</div>";
}

// ═══ UTILS ═══
function genId() { return Date.now()+Math.floor(Math.random()*1000); }
function esc(s) { return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function addMC(type, desc, agentId) {
  DATA.mainCourante.unshift({ id:genId(), date:new Date().toISOString(), type:type, description:desc, agent:PATROL_SESSION.prenom+" "+PATROL_SESSION.nom, agentId:agentId });
}
function toast(msg, cls) {
  var t=document.getElementById("toast"); t.textContent=msg; t.className="toast show"+(cls?" "+cls:"");
  clearTimeout(t._t); t._t=setTimeout(function(){ t.className="toast"; },2800);
}
function closeModal() {
  ["modal-anomalie","modal-scan","modal-validation"].forEach(function(id){ document.getElementById(id).classList.add("hidden"); });
  if (html5QrScanner) { try{html5QrScanner.stop();}catch(e){} html5QrScanner=null; }
}
function showInfo(titre, html) {
  var overlay = document.createElement("div");
  overlay.className="modal-bg";
  overlay.innerHTML = "<div class=\"modal-box\"><div style=\"font-weight:800;font-size:.95rem;margin-bottom:14px;\">"+titre+"</div><div style=\"max-height:50vh;overflow-y:auto;\">"+html+"</div><button onclick=\"this.parentElement.parentElement.remove()\" class=\"btn btn-gray\" style=\"margin-top:14px;\">Fermer</button></div>";
  document.body.appendChild(overlay);
}
function logout() {
  sessionStorage.removeItem("patrol_session");
  var params = new URLSearchParams(window.location.search);
  var centerId = PATROL_SESSION ? PATROL_SESSION.centerId : params.get("center");
  window.location.href = "patrol-login.html?center=" + centerId;
}
</script>
