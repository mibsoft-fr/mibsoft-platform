<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Auto-entraînement SSIAP — MIBsoft</title>
<meta name="theme-color" content="#F8FAFC">
<link rel="icon" href="/logo/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="mib-design.css">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>

<style>
/* =============================================================
   AUTO-ENTRAÎNEMENT — Design system "Vigil"
   Aliases legacy → on garde les anciennes classes (.btn, .card,
   .nb-btn, .fi, .choice-btn, .badge, .modal-*) mais on les
   restyle avec les tokens Vigil.
   ============================================================= */

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  color: var(--text-2);
  background: var(--bg-page);
}

body {
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 100%, rgba(37, 99, 235, 0.06) 0%, transparent 60%),
    var(--bg-page);
  -webkit-tap-highlight-color: transparent;
}

/* Headings */
.logo-t {
  font-family: var(--font-display);
  font-weight: var(--weight-extrabold);
  letter-spacing: var(--tracking-tight);
  color: var(--text-1);
}

/* ============ CARD — relief 3D + barre brand ============ */
.card {
  position: relative;
  overflow: hidden;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(15, 23, 42, 0.08);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.9) inset,
    0 4px 12px -2px rgba(15, 23, 42, 0.10),
    0 2px 4px -1px rgba(15, 23, 42, 0.06);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gradient-primary);
  z-index: 1;
}

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  font-size: var(--text-sm);
  letter-spacing: 0.01em;
  line-height: 1.2;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-in-out);
  position: relative;
  white-space: nowrap;
}
.btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
.btn:hover:not(:disabled) { transform: translateY(-1px); }
.btn:active:not(:disabled) { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* CTA principale (gradient brand) — utilisé pour .btn-blue, .btn-green */
.btn-blue,
.btn-green {
  background: var(--gradient-primary);
  color: var(--text-inverse);
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.25) inset,
    0 6px 14px -4px rgba(16, 185, 129, 0.45),
    0 2px 6px -2px rgba(15, 23, 42, 0.10);
}
.btn-blue:hover:not(:disabled),
.btn-green:hover:not(:disabled) {
  background: var(--gradient-primary-hover);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.25) inset,
    0 12px 24px -6px rgba(16, 185, 129, 0.50),
    0 4px 10px -2px rgba(15, 23, 42, 0.12);
}

/* Orange = mode GAME (warning gradient) */
.btn-orange {
  background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
  color: #fff;
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.25) inset,
    0 6px 14px -4px rgba(245, 158, 11, 0.50),
    0 2px 6px -2px rgba(15, 23, 42, 0.10);
}
.btn-orange:hover:not(:disabled) {
  background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.25) inset,
    0 12px 24px -6px rgba(245, 158, 11, 0.55),
    0 4px 10px -2px rgba(15, 23, 42, 0.12);
}

/* Gray = secondaire / annuler */
.btn-gray {
  background: #FFFFFF;
  color: var(--text-2);
  border-color: var(--border-default);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.9) inset,
    0 2px 6px -1px rgba(15, 23, 42, 0.08),
    0 1px 3px -1px rgba(15, 23, 42, 0.04);
}
.btn-gray:hover:not(:disabled) {
  background: var(--neutral-50);
  color: var(--text-1);
  border-color: var(--border-strong);
}

.btn-sm { padding: 7px 12px; font-size: var(--text-xs); border-radius: var(--radius-sm); }

/* Bouton valider multi (CTA majeure) */
.btn-valider {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-md);
  border: 1px solid rgba(255,255,255,0.15);
  font-weight: var(--weight-bold);
  font-size: var(--text-sm);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-in-out);
  background: var(--gradient-primary);
  color: var(--text-inverse);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.25) inset,
    0 6px 14px -4px rgba(16,185,129,0.45);
  margin-top: var(--space-3);
}
.btn-valider:hover:not(:disabled) {
  background: var(--gradient-primary-hover);
  transform: translateY(-1px);
}
.btn-valider:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============ TOGGLE BOUTONS (Niveau / Nb questions) ============ */
.nb-btn {
  padding: 10px 0;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--border-default);
  background: var(--bg-surface);
  font-family: var(--font-body);
  font-weight: var(--weight-bold);
  font-size: var(--text-sm);
  cursor: pointer;
  transition: all var(--duration-fast);
  color: var(--text-2);
  text-align: center;
}
.nb-btn:hover:not(.sel):not(:disabled) {
  border-color: var(--vigil-300);
  background: var(--vigil-50);
  color: var(--vigil-800);
}
.nb-btn.sel {
  border-color: var(--vigil-500);
  background: var(--vigil-50);
  color: var(--vigil-800);
  box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
}
.nb-btn:disabled { opacity: 0.45; cursor: default; }

/* ============ FILTRES (parties/séquences) ============ */
.fi {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-fast);
  border: 1.5px solid var(--border-default);
  background: var(--bg-surface);
  margin-bottom: 5px;
}
.fi:hover { border-color: var(--vigil-300); background: var(--vigil-50); }
.fi.sel {
  border-color: var(--vigil-500);
  background: var(--vigil-50);
}

/* ============ CHOICE BUTTONS (réponses QCM) ============ */
.choice-btn {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 2px solid var(--border-default);
  background: var(--bg-surface);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  text-align: left;
  cursor: pointer;
  transition: all var(--duration-fast);
  color: var(--text-1);
  line-height: var(--lh-normal);
}
.choice-btn:hover:not(:disabled) {
  border-color: var(--vigil-400);
  background: var(--vigil-50);
}
.choice-btn.correct {
  border-color: var(--success-500) !important;
  background: var(--success-50) !important;
  color: var(--success-800) !important;
  font-weight: var(--weight-bold);
}
.choice-btn.wrong {
  border-color: var(--danger-500) !important;
  background: var(--danger-50) !important;
  color: var(--danger-800) !important;
}
.choice-btn.show-ok {
  border-color: var(--success-500) !important;
  background: var(--success-50) !important;
}
.choice-btn.selected {
  border-color: var(--vigil-500) !important;
  background: var(--vigil-50) !important;
  color: var(--vigil-800) !important;
  font-weight: var(--weight-semibold);
}
.choice-btn.selected .chk-multi {
  background: var(--vigil-600);
  border-color: var(--vigil-600);
}

/* Checkbox simple (filtres) */
.chk {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  border: 2px solid var(--border-strong);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  transition: all var(--duration-fast);
  flex-shrink: 0;
  background: #fff;
}
.chk:checked {
  background: var(--vigil-600);
  border-color: var(--vigil-600);
}

/* Checkbox multi-réponses (gros) */
.chk-multi {
  width: 18px;
  height: 18px;
  border-radius: 5px;
  border: 2px solid var(--border-strong);
  flex-shrink: 0;
  transition: all var(--duration-fast);
  background: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.chk-multi.checked {
  background: var(--vigil-600);
  border-color: var(--vigil-600);
}
.chk-multi.checked::after {
  content: '';
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 2px;
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
}

/* ============ BADGES ============ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-wide);
  line-height: 1.4;
  white-space: nowrap;
}
.b-green  { background: var(--success-100); color: var(--success-800); border: 1px solid var(--success-200, #BBF7D0); }
.b-blue   { background: var(--info-100);    color: var(--info-800);    border: 1px solid var(--info-200, #BFDBFE); }
.b-orange { background: var(--warning-100); color: var(--warning-800); border: 1px solid var(--warning-200); }
.b-red    { background: var(--danger-100);  color: var(--danger-800);  border: 1px solid var(--danger-200); }
.b-gray   { background: var(--neutral-100); color: var(--neutral-700); border: 1px solid var(--neutral-200); }

/* ============ PROGRESS BAR ============ */
.prog-bar {
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--neutral-200);
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  border-radius: var(--radius-full);
  background: var(--gradient-primary);
  transition: width 0.4s var(--ease-out);
}

/* ============ SPINNER ============ */
@keyframes spin { to { transform: rotate(360deg); } }
.spin {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(16, 185, 129, 0.2);
  border-top-color: var(--vigil-600);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
}

/* ============ ANIMATIONS ============ */
.hidden { display: none !important; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.3s var(--ease-out) forwards; }

/* ============ SCORE RING (résultat) ============ */
.score-ring {
  position: relative;
  width: 130px;
  height: 130px;
}
.score-ring svg { transform: rotate(-90deg); }
.ring-bg {
  fill: none;
  stroke: var(--neutral-200);
  stroke-width: 10;
}
.ring-fill {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dasharray 1s var(--ease-out);
}
.score-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.score-center .logo-t {
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ============ MODAL ============ */
.modal-bg {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: var(--z-modal);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-4);
  animation: fadeUp 0.2s var(--ease-out);
}
.modal-box {
  position: relative;
  background: var(--bg-modal);
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  width: 100%;
  max-width: 560px;
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
  border: 1px solid rgba(15, 23, 42, 0.08);
}
.modal-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gradient-primary);
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

/* ============ TOPBAR (sticky) ============ */
.topbar-vigil {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  box-shadow: 0 2px 10px -4px rgba(15, 23, 42, 0.06);
}
.topbar-vigil .back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2rem;
  color: var(--text-3);
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: all var(--duration-fast);
}
.topbar-vigil .back-btn:hover { background: var(--neutral-100); color: var(--text-1); }

/* ============ KPI MINI (historique) ============ */
.kpi-mini {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #FFFFFF 0%, var(--vigil-50) 100%);
  border: 1px solid var(--vigil-200);
  border-radius: var(--radius-lg);
  padding: var(--space-3);
  text-align: center;
}

/* ============ RESPONSIVE MOBILE ============ */
@media (max-width: 520px) {
  .nb-btn { font-size: 0.78rem; padding: 8px 0; }
  .fi { padding: 8px 10px; font-size: 0.84rem; }
  #scr-home, #scr-question, #scr-result { padding: 12px; }
  .score-ring { width: 108px; height: 108px; }
  .score-ring svg { width: 108px; height: 108px; }
  .choice-btn { padding: 12px 13px; font-size: 0.86rem; }
  .modal-box { padding: 20px; border-radius: var(--radius-xl) var(--radius-xl) 0 0; max-height: 92vh; }
  .modal-bg { padding: 0; align-items: flex-end; }
  #top-stag { display: none; }
  div[style*="grid-template-columns:repeat(6"] { grid-template-columns: repeat(6, 1fr); gap: 5px; }
  .logo-t[style*="1.3rem"] { font-size: 1.15rem; }
}
@media (max-width: 360px) {
  div[style*="grid-template-columns:repeat(6"] { grid-template-columns: repeat(3, 1fr); }
}

/* ============ CONFETTI ============ */
@keyframes cf {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ============ FINAL MESSAGE (Gong/Applause) ============ */
@keyframes finalMsgIn {
  0%   { opacity: 0; transform: scale(0.7) translateY(20px); }
  60%  { opacity: 1; transform: scale(1.06) translateY(-2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.final-msg {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.35rem;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  animation: finalMsgIn 0.9s var(--ease-out) both;
}
.final-msg.good {
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.final-msg.meh {
  color: var(--text-1);
}
.final-emoji-big {
  font-size: 2.4rem;
  margin-bottom: 4px;
  display: block;
  animation: finalMsgIn 0.7s var(--ease-out) both;
}

/* ============ RECAP TOGGLE ============ */
#recap-toggle {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  border: 1.5px dashed var(--vigil-300);
  color: var(--vigil-700);
  font-weight: 700;
  font-size: .88rem;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all var(--duration-fast);
}
#recap-toggle:hover { background: var(--vigil-50); border-color: var(--vigil-500); }
.recap-q-ok { border-left: 4px solid var(--success-500) !important; }
.recap-q-ko { border-left: 4px solid var(--danger-500) !important; }
.recap-choice {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: .82rem;
  margin-bottom: 4px;
  line-height: 1.4;
  background: var(--neutral-50);
  border: 1px solid var(--neutral-200);
}
.recap-choice.is-correct {
  background: var(--success-50);
  border-color: var(--success-200, #BBF7D0);
  color: var(--success-800);
  font-weight: 600;
}
.recap-choice.is-user-wrong {
  background: var(--danger-50);
  border-color: var(--danger-200);
  color: var(--danger-800);
  text-decoration: line-through;
}
.recap-choice.is-user {
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ============ GAME MODE — Timer + animations ============ */
#timer-game {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
  color: #fff;
  padding: 8px 22px;
  border-radius: 999px;
  font-weight: 800;
  font-size: .95rem;
  z-index: 60;
  box-shadow: 0 6px 18px -2px rgba(245, 158, 11, 0.55);
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 6px;
}
#timer-game.danger {
  background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
  animation: pulse-timer 0.7s ease-in-out infinite;
}
@keyframes pulse-timer {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.07); }
}
#game-score-fly {
  position: fixed;
  pointer-events: none;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 2rem;
  z-index: 70;
  animation: score-fly 1.1s var(--ease-out) forwards;
  text-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
@keyframes score-fly {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  20%  { opacity: 1; transform: translate(-50%, -55%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
}
.game-mode #q-card {
  border: 2px solid transparent;
  background:
    linear-gradient(var(--bg-surface), var(--bg-surface)) padding-box,
    linear-gradient(135deg, #f59e0b 0%, #ef4444 100%) border-box;
}
.game-mode #q-card::before {
  background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
}
</style>
</head>
<body>
<div class="relative z-10 min-h-screen flex flex-col">
<div class="topbar-vigil">
  <div class="flex items-center gap-3">
    <button onclick="goBack()" class="back-btn">&#8592;</button>
    <span class="logo-t" style="font-size:.95rem;">Auto-entra&#238;nement</span>
  </div>
  <div class="flex items-center gap-2">
    <span id="top-stag" style="font-size:.78rem;font-weight:600;color:var(--text-2);"></span>
    <span id="top-badge" class="badge b-blue hidden"></span>
    <div id="top-score" class="hidden" style="display:flex;gap:12px;font-size:.78rem;font-weight:700;">
      <span style="color:var(--success-700);" id="sc-ok">OK: 0</span>
      <span style="color:var(--danger-700);" id="sc-ko">KO: 0</span>
    </div>
  </div>
</div>
<div id="scr-home" class="flex-1 p-4" style="max-width:560px;width:100%;margin:0 auto;">
  <div style="margin:12px 0 16px;" class="fade-up">
    <div class="logo-t" style="font-size:1.3rem;" id="home-titre">Quiz SSIAP</div>
    <div style="font-size:.82rem;color:#6b7280;margin-top:3px;">Entra&#238;ne-toi &#224; ton rythme</div>
  </div>
  <div class="card p-4 mb-3">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Niveau</div>
    <div style="display:flex;gap:8px;">
      <button onclick="selectNiveau('SSIAP1')" id="bn1" class="nb-btn" style="flex:1;">SSIAP 1</button>
      <button onclick="selectNiveau('SSIAP2')" id="bn2" class="nb-btn" style="flex:1;">SSIAP 2</button>
      <button onclick="selectNiveau('SSIAP3')" id="bn3" class="nb-btn" style="flex:1;">SSIAP 3</button>
    </div>

function renderFilters() {
  var el = document.getElementById('filter-list');
  var parties = STRUCT[selectedNiveau] || [];
  var allSel = selParties.size === 0 && selSeqs.size === 0;
  var html = '';
  html += '<div class="fi' + (allSel?' sel':'') + '" onclick="selTout()" style="border-color:#6366f1;background:' + (allSel?'#ede9fe':'#f5f3ff') + ';">';
  html += '<input type="checkbox" class="chk" ' + (allSel?'checked':'') + ' readonly style="pointer-events:none;' + (allSel?'background:#6366f1;border-color:#6366f1;':'') + '">';
  html += '<span style="font-size:.88rem;font-weight:700;">Toutes les parties</span></div>';
  for (var pi = 0; pi < parties.length; pi++) {
    var p = parties[pi];
    var pSel = selParties.has(p.id);
    html += '<div class="fi' + (pSel?' sel':'') + '" onclick="togglePartie(' + pi + ')" style="' + (pSel?'border-color:#059669;background:#f0fdf4;':'') + '">';
    html += '<input type="checkbox" class="chk" ' + (pSel?'checked':'') + ' readonly style="pointer-events:none;' + (pSel?'background:#059669;border-color:#059669;':'') + '">';
    html += '<span style="font-size:.84rem;font-weight:700;color:#065f46;">' + p.nom + '</span></div>';
    if (pSel && p.sequences) {
      for (var si = 0; si < p.sequences.length; si++) {
        var s = p.sequences[si];
        var sSel = selSeqs.has(s.nom);
        html += '<div class="fi' + (sSel?' sel':'') + '" style="margin-left:16px;' + (sSel?'border-color:#3b82f6;background:#eff6ff;':'') + '" onclick="toggleSeq(' + pi + ',' + si + ')">';
        html += '<input type="checkbox" class="chk" ' + (sSel?'checked':'') + ' readonly style="pointer-events:none;' + (sSel?'background:#3b82f6;border-color:#3b82f6;':'') + '">';
        html += '<span style="font-size:.82rem;">' + s.nom + '</span></div>';
      }
    }
  }
  el.innerHTML = html;
  // Le sous-titre des boutons QUIZ/GAME ne change plus dynamiquement
  // (le bouton porte deux lignes fixes \u2014 la s\u00e9lection est lisible dans les filtres ci-dessus)
}
function selTout() { selParties = new Set(); selSeqs = new Set(); renderFilters(); }
function togglePartie(pi) {
  var parties = STRUCT[selectedNiveau] || [];
  var p = parties[pi]; if (!p) return;
  if (selParties.has(p.id)) {
    selParties.delete(p.id);
    if (p.sequences) { for (var j=0;j<p.sequences.length;j++) selSeqs.delete(p.sequences[j].nom); }
  } else { selParties.add(p.id); }
  renderFilters();
}
function toggleSeq(pi, si) {
  var parties = STRUCT[selectedNiveau] || [];
  var p = parties[pi]; if (!p||!p.sequences||!p.sequences[si]) return;
  var seqNom = p.sequences[si].nom;
  if (!selParties.has(p.id)) selParties.add(p.id);
  if (selSeqs.has(seqNom)) selSeqs.delete(seqNom); else selSeqs.add(seqNom);
  renderFilters();
}

// Banque de questions — Source : JSON Challenge Cup SSIAP
// ============================================================
var QUESTIONS_CACHE = {}; // { 'SSIAP1': [...], 'SSIAP2': [...], 'SSIAP3': [...] }

async function loadQuestionsForLevel(niveau) {
  if (QUESTIONS_CACHE[niveau]) return QUESTIONS_CACHE[niveau];
  var num = niveau.replace('SSIAP', '');
  var resp = await fetch('challenge-cup-ssiap/data/ssiap' + num + '_FINAL_200.json');
  if (!resp.ok) throw new Error('Banque de questions indisponible (HTTP ' + resp.status + ')');
  var json = await resp.json();
  var raw = json.questions || [];
  QUESTIONS_CACHE[niveau] = raw.map(function(q) {
    var opts = q.options || [];
    var ca = (q.correctAnswers && q.correctAnswers.length) ? q.correctAnswers : [0];
    return {
      id: q.id,
      question: q.question || '',
      options: opts,
      correctAnswers: ca,           // array d'indices
      bonne_reponse: opts[ca[0]] || '',
      explication: (q.explanation && q.explanation.complete) || '',
      titre: q.themeLabel || q.sequenceLabel || '',
      partieLabel: q.partieLabel || '',
      sequenceLabel: q.sequenceLabel || '',
      themeLabel: q.themeLabel || '',
      partie: q.partie || '',
      niveau: 'SSIAP' + q.niveau,
      _source: 'challenge-cup'
    };
  });
  return QUESTIONS_CACHE[niveau];
}

async function startSession(mode) {
  mode = (mode === 'game') ? 'game' : 'quiz';
  window.CURRENT_MODE = mode;
  var errEl = document.getElementById('home-err');
  errEl.classList.add('hidden');
  var btnQuiz = document.getElementById('btn-start-quiz');
  var btnGame = document.getElementById('btn-start-game');
  var activeBtn = (mode === 'game') ? btnGame : btnQuiz;
  var prevHtml = activeBtn.innerHTML;
  btnQuiz.disabled = true; btnGame.disabled = true;
  activeBtn.innerHTML = '<span class="spin"></span> Chargement...';
  lastConfig = {niveau: selectedNiveau, nb: selectedNb, parties: new Set(selParties), seqs: new Set(selSeqs), mode: mode};

  try {
    // 1) Charger la banque de questions depuis le JSON Challenge Cup
    var all = await loadQuestionsForLevel(selectedNiveau);

    // 2) Filtrer par parties sélectionnées (matching sur partieLabel)
    var filtered = all;
    if (selParties.size > 0) {
      var partiesSelNoms = (STRUCT[selectedNiveau] || [])
        .filter(function(p) { return selParties.has(p.id); })
        .map(function(p) { return p.nom; });
      if (partiesSelNoms.length) {
        filtered = all.filter(function(q) { return partiesSelNoms.indexOf(q.partieLabel) !== -1; });
      }
    }
    // 3) Filtrage séquence (optionnel — matching sur sequenceLabel)
    if (selSeqs.size > 0) {
      filtered = filtered.filter(function(q) { return selSeqs.has(q.sequenceLabel); });
    }
    if (!filtered.length) throw new Error('Aucune question dans cette sélection — essayez un filtre plus large.');

    questions = shuffle(filtered).slice(0, Math.min(selectedNb, filtered.length));
    currentIdx = 0; correctCount = 0; wrongCount = 0; reponses = []; answered = false; startTime = Date.now();

    // 4) Création de la session Supabase (stats stagiaire — inchangé)
    sessionId = null;
    if (STAGIAIRE_ID) {
      try {
        // Vérifier l'auth Supabase avant insert (RLS exige authenticated + center_id JWT)
        var authChk = await supabase.auth.getSession();
        if (!authChk.data || !authChk.data.session) {
          console.warn('[entrainement] Session Supabase expirée — stats non enregistrables');
          showStatsWarning('⚠️ Session expirée — reconnectez-vous pour enregistrer les résultats (entraînement local OK).');
        } else {
          var payload = {
            stagiaire_id: STAGIAIRE_ID, center_id: CENTER_ID || null,
            niveau: selectedNiveau, nb_questions: questions.length, score: 0,
            max_score: questions.length, status: 'en_cours', mode: mode
          };
          var ins = await supabase.from('entrainement_sessions').insert(payload).select().single();
          if (ins.error && /mode/i.test(ins.error.message || '')) {
            delete payload.mode;
            ins = await supabase.from('entrainement_sessions').insert(payload).select().single();
          }
          if (ins.error) {
            console.error('[entrainement] insert failed:', ins.error, 'payload:', payload);
            var msg = ins.error.message || 'erreur inconnue';
            if (/row-level security|permission denied|policy/i.test(msg)) {
              showStatsWarning('⚠️ Permission refusée — center_id manquant ou session expirée. Reconnectez-vous.');
            } else {
              showStatsWarning('⚠️ Stats non enregistrées : ' + msg);
            }
          }
          sessionId = ins.data ? ins.data.id : null;
        }
      } catch(e) {
        console.error('[entrainement] insert exception:', e);
        showStatsWarning('⚠️ Stats non enregistrées : ' + (e.message || e));
      }
    } else {
      console.warn('[entrainement] Pas de STAGIAIRE_ID — stats non enregistrables');
    }

    // 5) Initialiser le tracking localStorage (détail des réponses)
    window.CURRENT_SESSION_ID = sessionId || ('local_' + Date.now());
    window.CURRENT_SESSION_DATA = {
      sessionId: window.CURRENT_SESSION_ID,
      niveau: selectedNiveau,
      mode: mode,
      nbQuestions: questions.length,
      startedAt: Date.now(),
      questions: questions.map(function(q) {
        return {
          id: q.id,
          question: q.question,
          options: q.options,
          correctAnswers: q.correctAnswers,
          bonne_reponse: q.bonne_reponse,
          explication: q.explication,
          titre: q.titre,
          partieLabel: q.partieLabel,
          sequenceLabel: q.sequenceLabel,
          themeLabel: q.themeLabel
        };
      })
    };

    // 6) Activer l'audio (geste utilisateur — politique navigateur)
    getAudioCtx();

    // 7) Affichage écran question (+ classe game-mode si mode game)
    document.body.classList.toggle('game-mode', mode === 'game');
    updateTopScore();
    showScreen('scr-question');
    renderQuestion();
  } catch(e) {
    errEl.textContent = 'Erreur : ' + (e.message || e);
    errEl.classList.remove('hidden');
  } finally {
    btnQuiz.disabled = false; btnGame.disabled = false;
    activeBtn.innerHTML = prevHtml;
    renderFilters();
  }
}

var gameTimer = null;
var gameTimeLeft = 60;

function startGameTimer() {
  clearGameTimer();
  if (window.CURRENT_MODE !== 'game') return;
  gameTimeLeft = 60;
  var wrap = document.getElementById('timer-game');
  var val = document.getElementById('timer-game-value');
  if (!wrap || !val) return;
  wrap.classList.remove('hidden', 'danger');
  val.textContent = gameTimeLeft;
  gameTimer = setInterval(function() {
    gameTimeLeft--;
    if (val) val.textContent = gameTimeLeft;
    if (gameTimeLeft <= 10 && wrap) wrap.classList.add('danger');
    // Bip court chaque seconde dans les 10 dernières (>0)
    if (gameTimeLeft <= 10 && gameTimeLeft > 0) {
      playBeep(880, 0.08, 0.2);
    }
    if (gameTimeLeft <= 0) {
      // Son grave de timeout
      playBeep(440, 0.3, 0.3);
      clearGameTimer();
      if (!answered) handleGameTimeout();
    }
  }, 1000);
}

function clearGameTimer() {
  if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
  var wrap = document.getElementById('timer-game');
  if (wrap) { wrap.classList.add('hidden'); wrap.classList.remove('danger'); }
}

function handleGameTimeout() {
  var q = questions[currentIdx];
  if (!q) return;
  answered = true;
  // Désactiver les boutons
  var allBtns = document.querySelectorAll('#q-choices .choice-btn');
  for (var i = 0; i < allBtns.length; i++) allBtns[i].disabled = true;
  document.getElementById('btn-valider').classList.add('hidden');
  // Afficher la bonne réponse en vert
  var choiceEls = document.getElementById('q-choices').querySelectorAll('.choice-btn');
  var offset = isMultiQ ? 1 : 0; // si multi, le 1er enfant est le hint
  for (var i = 0; i < multiChoices.length; i++) {
    var el = choiceEls[i + offset];
    if (el && multiChoices[i].correct) el.classList.add('correct');
  }
  wrongCount++;
  var bon = multiChoices.filter(function(c){return c.correct;}).map(function(c){return c.text;}).join(', ');
  reponses.push({q: q, isCorrect: false, choisi: '⏱️ Temps écoulé', bon: bon, timeout: true});
  if (window.CURRENT_SESSION_DATA && window.CURRENT_SESSION_DATA.questions[currentIdx]) {
    window.CURRENT_SESSION_DATA.questions[currentIdx].userAnswer = null;
    window.CURRENT_SESSION_DATA.questions[currentIdx].userCorrect = false;
    window.CURRENT_SESSION_DATA.questions[currentIdx].timeoutReason = 'timeout';
  }
  if (sessionId) supabase.from('entrainement_reponses').insert({session_id: sessionId, question_id: String(q.id), reponse: {question: q.question||'', choisie: null, bonne: bon, explication: q.explication||'', timeout: true, niveau: selectedNiveau}, est_correcte: false}).then(function(r){if(r&&r.error)console.error('[reponse insert TIMEOUT]',r.error);},function(e){console.error('[reponse insert TIMEOUT]',e);});
  updateTopScore();
  flyScore('+0', '#ef4444');
  setTimeout(function() {
    if (currentIdx + 1 < questions.length) nextQ();
    else showResults();
  }, 1100);
}

// Animation de score volant (mode GAME)
function flyScore(text, color) {
  if (window.CURRENT_MODE !== 'game') return;
  var el = document.createElement('div');
  el.id = 'game-score-fly';
  el.textContent = text;
  el.style.color = color || '#10b981';
  el.style.left = '50%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(function() { if (el && el.parentNode) el.parentNode.removeChild(el); }, 1200);
}

var isMultiQ = false;
var multiChoices = [];
var multiSelected = new Set();

function renderQuestion() {
  var q = questions[currentIdx];
  if (!q) { showResults(); return; }
  answered = false;
  isMultiQ = false;
  multiChoices = [];
  multiSelected = new Set();
  document.getElementById('prog').style.width = Math.round(currentIdx / questions.length * 100) + '%';
  document.getElementById('q-counter').textContent = (currentIdx + 1) + '/' + questions.length;
  var meta = document.getElementById('q-meta');
  meta.innerHTML = '';
  var th = (q.question_boites && q.question_boites.titre) || q.titre || '';
  if (th) { var b = document.createElement('span'); b.className = 'badge b-blue'; b.textContent = th; meta.appendChild(b); }
  document.getElementById('q-enonce').textContent = q.question || '-';
  document.getElementById('q-expl').classList.add('hidden');
  document.getElementById('btn-valider').classList.add('hidden');
  
  var choices = buildChoices(q);
  multiChoices = choices;
  
  // Détecter question multi-réponses (plus d'une bonne réponse)
  var nbCorrects = choices.filter(function(c) { return c.correct; }).length;
  isMultiQ = nbCorrects > 1;
  
  var el = document.getElementById('q-choices');
  el.innerHTML = '';
  
  // Mode QUIZ : bouton VALIDER toujours pr\u00e9sent (multi ou simple)
  // Mode GAME : valider \u00e0 chaque clic (rythme prime)
  var isQuizMode = (window.CURRENT_MODE !== 'game');
  var useValiderBtn = isMultiQ || isQuizMode;

  if (isMultiQ) {
    var hint = document.createElement('p');
    hint.style.cssText = 'font-size:.75rem;color:#6366f1;font-weight:600;margin-bottom:10px;';
    hint.textContent = '\u2611\ufe0f ' + nbCorrects + ' r\u00e9ponses correctes \u2014 s\u00e9lectionnez-les toutes';
    el.appendChild(hint);

    for (var i = 0; i < choices.length; i++) {
      (function(ch, idx) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.style.display = 'flex';
        btn.style.alignItems = 'center';
        btn.style.gap = '10px';
        var chk = document.createElement('span');
        chk.className = 'chk-multi';
        chk.id = 'chk-' + idx;
        var txt = document.createElement('span');
        txt.textContent = ch.text;
        btn.appendChild(chk);
        btn.appendChild(txt);
        btn.onclick = function() { toggleMulti(idx, btn, chk); };
        el.appendChild(btn);
      })(choices[i], i);
    }
    document.getElementById('btn-valider').classList.remove('hidden');
    document.getElementById('btn-valider').disabled = true;
  } else if (isQuizMode) {
    // QUIZ + question simple : s\u00e9lection unique avant validation
    for (var i = 0; i < choices.length; i++) {
      (function(ch, idx) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = ch.text;
        btn.onclick = function() { toggleSingleSelect(idx, btn); };
        el.appendChild(btn);
      })(choices[i], i);
    }
    document.getElementById('btn-valider').classList.remove('hidden');
    document.getElementById('btn-valider').disabled = true;
  } else {
    // GAME + question simple : validation imm\u00e9diate au clic
    for (var i = 0; i < choices.length; i++) {
      (function(ch) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = ch.text;
        btn.onclick = function() { selectAnswer(btn, ch.correct, q, choices); };
        el.appendChild(btn);
      })(choices[i]);
    }
  }
  
  var card = document.getElementById('q-card');
  card.classList.remove('fade-up');
  void card.offsetWidth;
  card.classList.add('fade-up');

  // Mode GAME : démarrer timer 60s
  startGameTimer();
}

function toggleMulti(idx, btn, chk) {
  if (answered) return;
  if (multiSelected.has(idx)) {
    multiSelected.delete(idx);
    btn.classList.remove('selected');
    chk.classList.remove('checked');
  } else {
    multiSelected.add(idx);
    btn.classList.add('selected');
    chk.classList.add('checked');
  }
  // Activer bouton valider si au moins 1 sélectionné
  document.getElementById('btn-valider').disabled = multiSelected.size === 0;
}

// QUIZ + question simple : sélection unique (radio-like) avant validation
function toggleSingleSelect(idx, btn) {
  if (answered) return;
  // Déselectionner tous les autres
  var allBtns = document.querySelectorAll('#q-choices .choice-btn');
  for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.remove('selected');
  // Sélectionner celui-ci
  btn.classList.add('selected');
  multiSelected = new Set([idx]);
  document.getElementById('btn-valider').disabled = false;
}

function validerMulti() {
  if (answered || multiSelected.size === 0) return;
  clearGameTimer();
  var q = questions[currentIdx];
  // Vérifier si les bonnes réponses sont exactement les sélectionnées
  var correctIndices = [];
  for (var i = 0; i < multiChoices.length; i++) {
    if (multiChoices[i].correct) correctIndices.push(i);
  }
  var selectedArr = Array.from(multiSelected).sort();
  var correctArr = correctIndices.sort();
  var isCorrect = JSON.stringify(selectedArr) === JSON.stringify(correctArr);

  answered = true;
  document.getElementById('btn-valider').classList.add('hidden');
  var allBtns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < allBtns.length; i++) allBtns[i].disabled = true;

  // GAME : feedback rapide vert/rouge (pas d'explication)
  // QUIZ : aucun feedback visuel, on passe à la suivante
  var isGame = (window.CURRENT_MODE === 'game');
  if (isGame) {
    var choiceEls = document.getElementById('q-choices').querySelectorAll('.choice-btn');
    var offset = isMultiQ ? 1 : 0; // +1 si le hint multi est en premier
    for (var i = 0; i < multiChoices.length; i++) {
      var el2 = choiceEls[i + offset];
      if (!el2) continue;
      el2.classList.remove('selected');
      if (multiChoices[i].correct) el2.classList.add('correct');
      else if (multiSelected.has(i)) el2.classList.add('wrong');
    }
  }

  var bon = correctIndices.map(function(i) { return multiChoices[i].text; }).join(', ');
  var userAnsText = selectedArr.map(function(i){return multiChoices[i].text;}).join(', ');
  if (isCorrect) correctCount++; else wrongCount++;
  reponses.push({q: q, isCorrect: isCorrect, choisi: userAnsText, bon: bon});
  // Persistance localStorage (détail)
  if (window.CURRENT_SESSION_DATA && window.CURRENT_SESSION_DATA.questions[currentIdx]) {
    window.CURRENT_SESSION_DATA.questions[currentIdx].userAnswer = userAnsText;
    window.CURRENT_SESSION_DATA.questions[currentIdx].userCorrect = isCorrect;
  }
  if (sessionId) supabase.from('entrainement_reponses').insert({session_id: sessionId, question_id: String(q.id), reponse: {question: q.question||'', choisie: userAnsText, bonne: bon, explication: q.explication||'', niveau: selectedNiveau}, est_correcte: isCorrect}).then(function(r){if(r&&r.error)console.error('[reponse insert]',r.error);},function(e){console.error('[reponse insert]',e);});
  updateTopScore();
  if (isGame) flyScore(isCorrect ? '+1' : '+0', isCorrect ? '#10b981' : '#ef4444');

  // Aucune explication affichée en cours de quiz — récap en fin
  var delay = isGame ? 700 : 250;
  setTimeout(function() {
    if (currentIdx + 1 < questions.length) nextQ();
    else showResults();
  }, delay);
}

function buildChoices(q) {
  // Format Challenge Cup (questions mappées) : q.options[] + q.correctAnswers[]
  if (q.options && q.options.length) {
    var corrects = (q.correctAnswers && q.correctAnswers.length) ? q.correctAnswers : [0];
    var result = [];
    for (var i = 0; i < q.options.length; i++) {
      var opt = q.options[i];
      result.push({text: typeof opt === 'string' ? opt : (opt.text || String(opt)), correct: corrects.indexOf(i) >= 0});
    }
    return shuffle(result);
  }
  // Format legacy Supabase : q.data / q.donnees
  var d = q.data || q.donnees;
  if (d) {
    var opts = d.options || [];
    var corrects2 = d.correctAnswers || (d.correctAnswer !== undefined ? [d.correctAnswer] : [0]);
    var result2 = [];
    for (var i = 0; i < opts.length; i++) {
      result2.push({text: typeof opts[i] === 'string' ? opts[i] : (opts[i].text || String(opts[i])), correct: corrects2.indexOf(i) >= 0});
    }
    return shuffle(result2);
  }
  if (q.option_a) {
    var opts3 = [];
    var lets = ['a','b','c','d'];
    for (var i = 0; i < lets.length; i++) {
      if (q['option_'+lets[i]]) opts3.push({text: q['option_'+lets[i]], correct: q.bonne_reponse === lets[i]});
    }
    return shuffle(opts3);
  }
  return [{text: 'Format inconnu', correct: true}];
}

function selectAnswer(btn, isCorrect, q, choices) {
  if (answered) return;
  answered = true;
  clearGameTimer();
  var allBtns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < allBtns.length; i++) allBtns[i].disabled = true;
  var bon = '';
  for (var i = 0; i < choices.length; i++) { if (choices[i].correct) { bon = choices[i].text; break; } }
  // GAME : feedback visuel rapide
  if (window.CURRENT_MODE === 'game') {
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    // Si faux, mettre aussi la bonne en vert
    if (!isCorrect) {
      for (var i = 0; i < allBtns.length; i++) {
        if (allBtns[i].textContent === bon) allBtns[i].classList.add('correct');
      }
    }
  }
  btn.setAttribute('data-chosen', '1');
  if (isCorrect) { correctCount++; } else { wrongCount++; }
  reponses.push({q: q, isCorrect: isCorrect, choisi: btn.textContent, bon: bon});
  // Persistance localStorage (détail)
  if (window.CURRENT_SESSION_DATA && window.CURRENT_SESSION_DATA.questions[currentIdx]) {
    window.CURRENT_SESSION_DATA.questions[currentIdx].userAnswer = btn.textContent;
    window.CURRENT_SESSION_DATA.questions[currentIdx].userCorrect = isCorrect;
  }
  if (sessionId) supabase.from('entrainement_reponses').insert({session_id: sessionId, question_id: String(q.id), reponse: {question: q.question||'', choisie: btn.textContent, bonne: bon, explication: q.explication||'', niveau: selectedNiveau}, est_correcte: isCorrect}).then(function(r){if(r&&r.error)console.error('[reponse insert]',r.error);},function(e){console.error('[reponse insert]',e);});
  updateTopScore();
  if (window.CURRENT_MODE === 'game') flyScore(isCorrect ? '+1' : '+0', isCorrect ? '#10b981' : '#ef4444');
  // Délai court pour voir le feedback en GAME
  var delay = window.CURRENT_MODE === 'game' ? 600 : 200;
  setTimeout(function() {
    if (currentIdx + 1 < questions.length) nextQ();
    else showResults();
  }, delay);
}

function nextQ() { currentIdx++; renderQuestion(); }

function updateTopScore() {
  document.getElementById('top-score').style.display = 'flex';
  document.getElementById('sc-ok').textContent = 'OK: ' + correctCount;
  document.getElementById('sc-ko').textContent = 'KO: ' + wrongCount;
}

async function showResults() {
  clearGameTimer();
  document.body.classList.remove('game-mode');
  var total = questions.length;
  var pct = Math.round(correctCount / total * 100);
  var dur = Math.round((Date.now() - startTime) / 1000);
  if (sessionId) await supabase.from('entrainement_sessions').update({score: correctCount, status: 'terminee', duree_secondes: dur}).eq('id', sessionId);
  // Sauvegarder les réponses dans la session pour l'historique
  lastReponses = reponses.slice();

  // Persistance localStorage (LRU 20 sessions)
  if (window.CURRENT_SESSION_DATA) {
    window.CURRENT_SESSION_DATA.score = correctCount;
    window.CURRENT_SESSION_DATA.scorePct = pct;
    window.CURRENT_SESSION_DATA.completedAt = Date.now();
    try {
      localStorage.setItem('mib_session_' + window.CURRENT_SESSION_ID, JSON.stringify(window.CURRENT_SESSION_DATA));
      var keys = Object.keys(localStorage).filter(function(k) { return k.indexOf('mib_session_') === 0; });
      if (keys.length > 20) {
        // Trier par completedAt ascendant si possible
        keys.sort(function(a, b) {
          try {
            var da = JSON.parse(localStorage.getItem(a) || '{}').completedAt || 0;
            var db = JSON.parse(localStorage.getItem(b) || '{}').completedAt || 0;
            return da - db;
          } catch(e) { return 0; }
        });
        while (keys.length > 20) {
          localStorage.removeItem(keys.shift());
        }
      }
    } catch(e) { console.warn('[mib] localStorage plein', e); }
  }

  showScreen('scr-result');
  document.getElementById('r-pct').textContent = pct + '%';
  document.getElementById('r-ok').textContent = correctCount;
  document.getElementById('r-ko').textContent = wrongCount;
  var m = Math.floor(dur/60), s = dur%60;
  document.getElementById('r-time').textContent = (m > 0 ? m + 'm ' : '') + s + 's';
  document.getElementById('r-detail').textContent = correctCount + ' / ' + total + ' correctes';

  // Messages adaptés au score + prénom
  var prenomTxt = PRENOM ? (' ' + PRENOM.split(' ')[0]) : '';
  var msg, emoji, isGood;
  if (pct >= 95) {
    msg = '🎉 Parfait' + prenomTxt + ' ! Tu es prêt(e) !'; emoji = '🥇'; isGood = true;
  } else if (pct >= 85) {
    msg = '🎉 Excellent' + prenomTxt + ' ! Quel score !'; emoji = '🏆'; isGood = true;
  } else if (pct >= 70) {
    msg = '🎉 Bravo' + prenomTxt + ' ! Très bien joué !'; emoji = '🎯'; isGood = true;
  } else if (pct >= 50) {
    msg = '💪 Encore un effort' + prenomTxt + ' !'; emoji = '💪'; isGood = false;
  } else if (pct >= 30) {
    msg = '📚 Reprends les bases tranquillement' + prenomTxt + '.'; emoji = '📚'; isGood = false;
  } else {
    msg = '🔄 Pas de panique, recommence avec moins de questions.'; emoji = '🔄'; isGood = false;
  }
  var msgEl = document.getElementById('r-msg');
  msgEl.textContent = msg;
  msgEl.classList.remove('good', 'meh');
  msgEl.classList.add(isGood ? 'good' : 'meh');
  document.getElementById('r-emoji').textContent = emoji;

  var circ = 2 * Math.PI * 52;
  var ring = document.getElementById('ring-fill');
  ring.style.stroke = pct >= 75 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
  setTimeout(function() { ring.style.strokeDasharray = (circ * pct / 100) + ' ' + circ; }, 100);

  // Gong + (si bon score) applause + confetti
  playGong();
  if (pct >= 70) {
    createConfetti();
    setTimeout(function() { playApplause(); }, 1200);
  }

  // Préparer le récap (caché par défaut, déroulable via le bouton)
  var recapBtn = document.getElementById('recap-toggle');
  if (recapBtn) {
    recapBtn.classList.remove('hidden');
    recapBtn.innerHTML = '&#128218; Voir les questions et explications &#9662;';
  }
  document.getElementById('correction-wrap').classList.add('hidden');
  // Analyse par partie (utilise partieLabel des questions Challenge Cup,
  // ou fallback boite_id pour compat ascendante)
  var byB = {};
  for (var i = 0; i < reponses.length; i++) {
    var r = reponses[i];
    var bid = r.q.partieLabel || r.q.boite_id || 'Sans partie';
    if (!byB[bid]) byB[bid] = {ok:0, n:0, nom:''};
    byB[bid].n++;
    if (r.isCorrect) byB[bid].ok++;
    if (!byB[bid].nom) {
      var qb = r.q.question_boites;
      byB[bid].nom = r.q.partieLabel || (qb && qb.titre ? qb.titre : 'Partie');
    }
  }
  var keys = Object.keys(byB);
  if (keys.length >= 1) {
    document.getElementById('analyse-wrap').classList.remove('hidden');
    var aHtml = '';
    var forces = [], axes = [];
    for (var k = 0; k < keys.length; k++) {
      var v = byB[keys[k]];
      var p2 = Math.round(v.ok / v.n * 100);
      var col = p2 >= 75 ? '#10b981' : p2 >= 50 ? '#f59e0b' : '#ef4444';
      if (p2 >= 75) forces.push(v.nom);
      else if (p2 < 60) axes.push(v.nom);
      aHtml += '<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:.82rem;font-weight:600;margin-bottom:4px;"><span>' + v.nom + '</span><span style="color:' + col + ';">' + v.ok + '/' + v.n + ' · ' + p2 + '%</span></div><div class="prog-bar"><div class="prog-fill" style="width:' + p2 + '%;background:' + col + ';"></div></div></div>';
    }
    // Forces
    if (forces.length) aHtml = '<div style="background:#f0fdf4;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;"><strong style="color:#065f46;">&#127775; Points forts :</strong> ' + forces.join(', ') + '</div>' + aHtml;
    // Axes
    if (axes.length) aHtml += '<div style="background:#fff7ed;border-radius:10px;padding:10px 14px;margin-top:8px;font-size:.82rem;"><strong style="color:#c2410c;">&#128218; &#192; retravailler :</strong> ' + axes.join(', ') + '</div>';
    document.getElementById('analyse-list').innerHTML = aHtml;
  }
  // Récap détaillé (caché par défaut — affiché via bouton toggleRecap)
  var cHtml = '';
  for (var i = 0; i < reponses.length; i++) {
    var r = reponses[i];
    var cls = r.isCorrect ? 'b-green' : 'b-red';
    var lbl = r.isCorrect ? '&#10003; Correct' : (r.timeout ? '&#9201;&#65039; Temps écoulé' : '&#10007; Incorrect');
    var cardCls = r.isCorrect ? 'recap-q-ok' : 'recap-q-ko';
    var userAns = (r.choisi || '').split(',').map(function(x){return x.trim();});
    var bonAns = (r.bon || '').split(',').map(function(x){return x.trim();});

    cHtml += '<div class="card p-4 ' + cardCls + '" style="margin-bottom:10px;">';
    cHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;">';
    cHtml += '<span style="font-size:.72rem;font-weight:700;color:#6b7280;">Question ' + (i+1) + ' / ' + total + '</span>';
    cHtml += '<span class="badge ' + cls + '">' + lbl + '</span></div>';
    if (r.q.partieLabel || r.q.themeLabel) {
      cHtml += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">';
      if (r.q.partieLabel) cHtml += '<span class="badge b-gray" style="font-size:.62rem;">' + r.q.partieLabel + '</span>';
      if (r.q.themeLabel && r.q.themeLabel !== r.q.partieLabel) cHtml += '<span class="badge b-blue" style="font-size:.62rem;">' + r.q.themeLabel + '</span>';
      cHtml += '</div>';
    }
    cHtml += '<p style="font-size:.9rem;font-weight:600;margin-bottom:10px;line-height:1.5;">' + (r.q.question || '') + '</p>';

    // Lister TOUS les choix (vert = bon, souligné = ma réponse, rouge si ma réponse fausse)
    var opts = r.q.options || [];
    var correctIdxs = r.q.correctAnswers || [];
    if (opts.length) {
      cHtml += '<div style="margin-bottom:10px;">';
      for (var j = 0; j < opts.length; j++) {
        var optText = typeof opts[j] === 'string' ? opts[j] : (opts[j] && opts[j].text ? opts[j].text : String(opts[j]));
        var isCorrectOpt = correctIdxs.indexOf(j) !== -1;
        var isUserOpt = userAns.indexOf(optText) !== -1;
        var rcCls = 'recap-choice';
        if (isCorrectOpt) rcCls += ' is-correct';
        if (isUserOpt && !isCorrectOpt) rcCls += ' is-user-wrong';
        if (isUserOpt) rcCls += ' is-user';
        var prefix = isCorrectOpt ? '&#10003; ' : (isUserOpt ? '&#10007; ' : '&#9675; ');
        cHtml += '<div class="' + rcCls + '">' + prefix + optText + '</div>';
      }
      cHtml += '</div>';
    } else {
      // Fallback : pas d'options listées, juste bonne/ma réponse
      cHtml += '<div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.82rem;">';
      cHtml += '<strong style="color:#065f46;">&#10003; Bonne r&#233;ponse :</strong> ' + r.bon + '</div>';
      if (!r.isCorrect) {
        cHtml += '<div style="background:#fff1f2;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.82rem;">';
        cHtml += '<strong style="color:#b91c1c;">Votre r&#233;ponse :</strong> ' + (r.choisi || '—') + '</div>';
      }
    }

    if (r.q.explication) {
      cHtml += '<div style="background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1d4ed8;line-height:1.5;">';
      cHtml += '<strong>&#128161; Explication :</strong> ' + r.q.explication + '</div>';
    }
    cHtml += '</div>';
  }
  document.getElementById('correction-list').innerHTML = cHtml;
  if (typeof loadHistorique === 'function') loadHistorique();
}

async function openModalHisto() {
  if (!STAGIAIRE_ID) return;
  var res = await supabase.from('entrainement_sessions').select('*').eq('stagiaire_id', STAGIAIRE_ID).order('started_at', {ascending:false}).limit(20);
  if (res.error) { alert('Erreur: ' + res.error.message); return; }
  var data = res.data;
  if (!data || !data.length) { alert('Aucun entraînement trouvé.'); return; }
  histoSessions = data;
  var total = data.length;
  var sum = 0;
  for (var i = 0; i < data.length; i++) sum += data[i].nb_questions ? data[i].score/data[i].nb_questions*100 : 0;
  var moy = total ? Math.round(sum/total) : 0;
  var reussis = 0;
  for (var i = 0; i < data.length; i++) { if (data[i].nb_questions && data[i].score/data[i].nb_questions >= 0.6) reussis++; }
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">';
  html += '<div class="card p-3 text-center"><div class="logo-t" style="font-size:1.4rem;color:#3b82f6;">' + total + '</div><div style="font-size:.68rem;color:#6b7280;">Entra\u00eenements</div></div>';
  html += '<div class="card p-3 text-center"><div class="logo-t" style="font-size:1.4rem;color:' + (moy>=60?'#059669':'#ef4444') + ';">' + moy + '%</div><div style="font-size:.68rem;color:#6b7280;">Moyenne</div></div>';
  html += '<div class="card p-3 text-center"><div class="logo-t" style="font-size:1.4rem;color:#059669;">' + reussis + '</div><div style="font-size:.68rem;color:#6b7280;">R\u00e9ussis</div></div></div>';
  // Conseil global
  if (moy < 60) html += '<div style="background:#fff7ed;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;color:#c2410c;"><strong>Axe d&#39;am\u00e9lioration :</strong> Continuez l&#39;entra\u00eenement r\u00e9guli\u00e8rement — la r\u00e9p\u00e9tition est la cl\u00e9 de la r\u00e9ussite.</div>';
  else if (moy >= 80) html += '<div style="background:#f0fdf4;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;color:#065f46;"><strong>Excellent niveau !</strong> Maintenez ce rythme et d\u00e9couvrez les th\u00e8mes non encore travaill\u00e9s.</div>';
  html += '<div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Historique d\u00e9taill\u00e9</div>';
  for (var i = 0; i < data.length; i++) {
    var s = data[i];
    var p = s.nb_questions ? Math.round(s.score/s.nb_questions*100) : 0;
    var col = p >= 75 ? '#059669' : p >= 50 ? '#d97706' : '#b91c1c';
    var cls = p >= 75 ? 'b-green' : p >= 50 ? 'b-orange' : 'b-red';
    var dt = new Date(s.started_at || s.ended_at).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    html += '<div class="card p-3 mb-2" style="display:flex;align-items:center;gap:12px;">';
    html += '<div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:900;color:' + col + ';min-width:40px;">' + p + '%</div>';
    html += '<div style="font-size:.82rem;font-weight:700;">' + s.niveau + ' \u00b7 ' + s.nb_questions + ' q \u00b7 ' + (s.duree_secondes||0) + 's</div>';
    html += '<div style="font-size:.7rem;color:#9ca3af;">' + dt + '</div>';
    if (p < 100) html += '<button onclick="reviewErrIdx(' + i + ')" style="margin-top:4px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;border-radius:6px;padding:3px 10px;font-size:.7rem;font-weight:700;cursor:pointer;">Revoir les erreurs \u2192</button>';
    else html += '<div style="font-size:.68rem;color:#059669;margin-top:2px;">Score parfait !</div>';
    html += '</div><span class="badge ' + cls + '">' + s.score + '/' + s.nb_questions + '</span></div>';
  }
  document.getElementById('modal-histo-content').innerHTML = html;
  document.getElementById('modal-histo').classList.remove('hidden');
}

function reviewErrIdx(i) { reviewErrors(histoSessions[i]); }
async function reviewErrors(sess) {
  var sessId = (sess && sess.id) || sess;
  var sessNiveau = (sess && sess.niveau) || selectedNiveau;

  // 1) PRIORITÉ : localStorage (détail complet questions + réponses)
  var localSess = null;
  try {
    var rawLs = localStorage.getItem('mib_session_' + sessId);
    if (rawLs) localSess = JSON.parse(rawLs);
  } catch(e) { localSess = null; }

  if (localSess && localSess.questions && localSess.questions.length) {
    var lqs = localSess.questions;
    var errs = lqs.filter(function(q) { return q.userCorrect === false; });
    if (!errs.length) { alert('Bravo ! Aucune erreur dans cette session.'); return; }
    var totalLQ = lqs.length;
    var okLQ = lqs.filter(function(q) { return q.userCorrect === true; }).length;
    var pctLQ = Math.round(okLQ / totalLQ * 100);
    document.getElementById('modal-erreurs-sub').textContent = pctLQ + '% · ' + errs.length + ' erreur(s) sur ' + totalLQ + ' questions';
    var lHtml = '<div style="background:#fff7ed;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.82rem;color:#c2410c;">';
    lHtml += '<strong>Conseil :</strong> Relisez bien les explications avant de refaire ces thèmes.</div>';
    for (var li = 0; li < errs.length; li++) {
      var lq = errs[li];
      var lopts = lq.options || [];
      var lcorrectIdxs = lq.correctAnswers || [];
      var luserAns = lq.userAnswer || '';
      var luserAnsArr = (typeof luserAns === 'string') ? luserAns.split(',').map(function(x){return x.trim();}) : [];
      lHtml += '<div class="card p-4 recap-q-ko" style="margin-bottom:10px;">';
      if (lq.partieLabel || lq.themeLabel) {
        lHtml += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">';
        if (lq.partieLabel) lHtml += '<span class="badge b-gray" style="font-size:.62rem;">' + lq.partieLabel + '</span>';
        if (lq.themeLabel && lq.themeLabel !== lq.partieLabel) lHtml += '<span class="badge b-blue" style="font-size:.62rem;">' + lq.themeLabel + '</span>';
        lHtml += '</div>';
      }
      lHtml += '<p style="font-size:.88rem;font-weight:600;margin-bottom:10px;line-height:1.5;">' + (lq.question||'') + '</p>';
      if (lopts.length) {
        lHtml += '<div style="margin-bottom:10px;">';
        for (var lj = 0; lj < lopts.length; lj++) {
          var loptText = typeof lopts[lj] === 'string' ? lopts[lj] : (lopts[lj] && lopts[lj].text ? lopts[lj].text : String(lopts[lj]));
          var lisCorrect = lcorrectIdxs.indexOf(lj) !== -1;
          var lisUser = luserAnsArr.indexOf(loptText) !== -1;
          var lrcCls = 'recap-choice';
          if (lisCorrect) lrcCls += ' is-correct';
          if (lisUser && !lisCorrect) lrcCls += ' is-user-wrong';
          if (lisUser) lrcCls += ' is-user';
          var lprefix = lisCorrect ? '✓ ' : (lisUser ? '✗ ' : '○ ');
          lHtml += '<div class="' + lrcCls + '">' + lprefix + loptText + '</div>';
        }
        lHtml += '</div>';
      } else if (lq.bonne_reponse) {
        lHtml += '<div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;font-size:.82rem;color:#065f46;margin-bottom:6px;"><strong>Bonne réponse :</strong> ' + lq.bonne_reponse + '</div>';
      }
      if (lq.explication) lHtml += '<div style="background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1d4ed8;line-height:1.5;"><strong>Explication :</strong> ' + lq.explication + '</div>';
      lHtml += '</div>';
    }
    document.getElementById('modal-erreurs-content').innerHTML = lHtml;
    closeModalHisto();
    document.getElementById('modal-erreurs').classList.remove('hidden');
    return;
  }

  // 2) FALLBACK : Supabase (sessions anciennes — peut être vide à cause du bug d'insertion)
  var res = await supabase.from('entrainement_reponses').select('question_id, est_correcte').eq('session_id', sessId);
  var reps = res.data;
  if (!reps || !reps.length) {
    alert('Cette session est trop ancienne (avant la mise à jour) — les données détaillées ne sont plus disponibles.');
    return;
  }
  var errIds = reps.filter(function(r) { return !r.est_correcte; }).map(function(r) { return String(r.question_id); });
  if (!errIds.length) { alert('Bravo ! Aucune erreur dans cette session.'); return; }
  var bank = [];
  try { bank = await loadQuestionsForLevel(sessNiveau); } catch(e) { bank = []; }
  var qs = bank.filter(function(q) { return errIds.indexOf(String(q.id)) !== -1; });
  if (!qs.length) {
    try {
      var res2 = await supabase.from('questions').select('*').in('id', errIds);
      qs = res2.data || [];
    } catch(e) { qs = []; }
  }
  if (!qs.length) {
    alert('Cette session est trop ancienne (avant la mise à jour) — les données détaillées ne sont plus disponibles.');
    return;
  }
  var totalQ = reps.length;
  var okQ = reps.filter(function(r) { return r.est_correcte; }).length;
  var pctQ = Math.round(okQ/totalQ*100);
  document.getElementById('modal-erreurs-sub').textContent = pctQ + '% · ' + errIds.length + ' erreur(s) sur ' + totalQ + ' questions';
  var html = '<div style="background:#fff7ed;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.82rem;color:#c2410c;">';
  html += '<strong>Conseil :</strong> Relisez bien les explications avant de refaire ces thèmes.</div>';
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i];
    var bon = buildChoices(q).filter(function(ch) { return ch.correct; });
    html += '<div class="card p-4 recap-q-ko" style="margin-bottom:10px;">';
    if (q.titre) html += '<span class="badge b-blue" style="font-size:.68rem;margin-bottom:6px;display:inline-block;">' + q.titre + '</span><br>';
    html += '<p style="font-size:.88rem;font-weight:600;margin-bottom:10px;line-height:1.5;">' + (q.question||'') + '</p>';
    html += '<div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;font-size:.82rem;color:#065f46;margin-bottom:6px;">';
    html += '<strong>Bonne réponse :</strong> ' + (bon.length ? bon[0].text : '-') + '</div>';
    if (q.explication) html += '<div style="background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1d4ed8;line-height:1.5;"><strong>Explication :</strong> ' + q.explication + '</div>';
    html += '</div>';
  }
  document.getElementById('modal-erreurs-content').innerHTML = html;
  closeModalHisto();
  document.getElementById('modal-erreurs').classList.remove('hidden');
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function createConfetti() {
  var cols = ['#6366f1','#3b82f6','#10b981','#f59e0b','#ef4444'];
  for (var i = 0; i < 60; i++) {
    var d = document.createElement('div');
    d.style.cssText = 'position:fixed;width:' + (5+Math.random()*8) + 'px;height:' + (5+Math.random()*8) + 'px;background:' + cols[Math.floor(Math.random()*cols.length)] + ';left:' + Math.random()*100 + 'vw;top:-10px;z-index:9999;border-radius:' + (Math.random()>.5?'50%':'2px') + ';animation:cf ' + (2+Math.random()*2) + 's linear forwards;';
    document.getElementById('confetti').appendChild(d);
    setTimeout(function(el) { return function() { el.remove(); }; }(d), 4000);
  }
}

// ============================================================
// AUDIO (Web Audio API — pas de fichier)
// ============================================================
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    try { audioCtx.resume(); } catch(e) {}
  }
  return audioCtx;
}

function playBeep(freq, duration, volume) {
  var ctx = getAudioCtx(); if (!ctx) return;
  try {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq || 880;
    gain.gain.value = 0;
    osc.connect(gain).connect(ctx.destination);
    var now = ctx.currentTime;
    var dur = (duration || 0.1);
    var vol = (volume || 0.3);
    gain.gain.linearRampToValueAtTime(vol, now + 0.01);
    gain.gain.linearRampToValueAtTime(0, now + dur);
    osc.start(now);
    osc.stop(now + dur);
  } catch(e) {}
}

function playGong() {
  var ctx = getAudioCtx(); if (!ctx) return;
  [120, 240, 360].forEach(function(freq, i) {
    setTimeout(function() {
      try {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0;
        osc.connect(gain).connect(ctx.destination);
        var now = ctx.currentTime;
        gain.gain.linearRampToValueAtTime(0.25 - i * 0.05, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
        osc.start(now);
        osc.stop(now + 2.5);
      } catch(e) {}
    }, i * 40);
  });
}

function playApplause() {
  var ctx = getAudioCtx(); if (!ctx) return;
  for (var i = 0; i < 40; i++) {
    setTimeout(function() {
      try {
        var bufferSize = Math.floor(ctx.sampleRate * 0.1);
        var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var j = 0; j < bufferSize; j++) {
          data[j] = (Math.random() - 0.5) * Math.exp(-j / (bufferSize * 0.3));
        }
        var src = ctx.createBufferSource();
        var filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1500 + Math.random() * 2000;
        var gain = ctx.createGain();
        gain.gain.value = 0.05 + Math.random() * 0.1;
        src.buffer = buffer;
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start();
      } catch(e) {}
    }, i * 80 + Math.random() * 100);
  }
}
